body:
  text: 求生行門第九夫求生行門者念有五門修有四方此方白業將熟彼土紅蓮已生蓋觀利鈍之機廣說頓漸之教初則量力修進忖己功夫乘閑暇之時取幽靜之處或踵九品之軌則或依三輩之規繩或有良緣而結社或無勝侶則孤修須求同志深究佛乘勿與餘人空談世務只宜杜絕人事屏棄塵緣無義不言非時不出布衣蔬飯護戒持齋行願迴向於西方事理專修於淨土若依此法決得往生閻浮精進不多時極樂逍遙無量劫今日道場同業大眾相與發起往生大願已竟次應漸依求生行門如法修進是以有願無行其願必虗有行無願其行必孤要須行願相符福智相資必得往生疾成聖道志意虔誠五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無七十七俱胝佛南無東南方現在一切諸佛南無最上廣大雲雷音王佛如是等佛如殑伽沙住在東南方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大眾若欲勸人求生淨土安心起行作業修因定得往生今於諸經集成眾行奉勸人人隨其廣略依經修行盡獲勝果頌曰初修每日晨朝時合掌面西持聖號各念十聲復頂禮龍舒淨土文內說龍舒文超脫輪迴㨗徑圖略云大藏十餘經言西方淨土事人皆蓮華中生衣食化成長生不老其修行法門有九品今節出眾人可通行者阿彌陀佛有大誓願云我作佛時十方眾生至心信樂欲生我國十聲念我名號而不生者我不作佛現世可以消災解怨增福保壽每朝合掌向西頂禮念曰南無阿彌陀佛南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩已上名念十聲復頂禮次念大慈菩薩讚佛懺罪迴向發願一遍十方三世佛阿彌陀第一九品度眾生威德無窮極我今大歸依懺悔三業罪凡有諸福善至心用迴向願同念佛人盡生極樂國見佛了生死如佛度一切復頂禮而退此偈大有威力能滅一切罪長一切福教人念得福報至誠如是必中品生更加精進轉以化人使更相勸化則上品生罪惡人修亦下品生此間念佛西方七寶池生蓮華一朵標其姓名他日於其中託生比陰府記姓名待其命盡來追者大不同矣今日道場同業大眾善攝心耳渴仰諦聽天親論曰若有願生彼國者勸修五念門五門若具定得往生何者為五一者身業禮拜門所謂一心專志恭敬合掌香華供養禮拜彼阿彌陀佛禮即專禮彼佛畢命為期不雜餘禮故二者口業讚歎門所謂專臆讚歎彼佛身相光明一切聖眾自相光明及彼國中一切寶莊嚴光明等故三者意業臆念觀察門所謂專意念觀彼佛及一切聖眾身相光明國土莊嚴等如觀經說唯除睡時恒憶恒念恒想恒觀此事等故四者作願門所謂專心若晝若夜一切時一切處三業四儀所作功德不問初中後皆須真實心中發願願生彼國故五者迴向門所謂專心自作善根及一切三乘五道一一凡聖等所作善根深生隨喜如諸佛菩薩所作隨喜我亦如是隨喜以此隨喜善根及己所作善根皆悉與眾生共之迴向彼國故又到彼國已得六神通迴入生死教化眾生徹窮後際心無厭足乃至成佛亦名迴向門五門既具定得往生隨起業行不問多少皆名真實業也大親論云觀行四修法用策三心五念之行速得往生何者為四一者恭敬修恭敬禮拜彼佛一切聖眾故名恭敬修畢命為期誓不中止即是常時修准甘露疏云恭敬修復有五種一敬有緣聖主行住坐臥及便穢等皆獲西方二敬有緣像教設彌陀像及持其教三敬有緣師友恭敬親近故四敬同學人即同修淨業者玄相勸益故五常敬三寶是彼生勝緣故如此敬修決定往生二者無餘修所謂專稱彼佛名專想專禮讚彼佛及一切聖眾等不雜餘業故名無餘修畢命為期誓不中止即是常時修三者無間修所謂相續恭敬禮拜稱名讚歎憶念觀察迴向發願心心相續不以餘業來間故名無間修又不以貪嗔煩惱來間隨犯隨懺不令隔念隔時隔日常便清淨亦名無間修畢命為期誓不中止即是常時修四者迴向修謂菩薩已免生死所作善法迴求佛果即是自利教化眾生盡未來際即是利他然今時眾生悉煩惱繫縛未免惡道生死等苦隨緣起行一切善根且速迴願往生彌陀佛國到彼國已更無所畏如上四修自然任運自利利他無不具足一行三昧求生門獨處空閑捨亂意係心專念見彌陀文殊般若如是說文殊般若云欲明一行三昧唯勸獨處空閑捨諸亂意係心一佛不觀相貌專稱名字即於念中得見彼阿彌陀佛及一切佛等問曰何故不令作觀直遣專稱名字耶答曰乃由眾生或業障重觀難成就是以大聖悲憐直勸專稱名字正由稱名易故相續即生問曰專稱一佛何故現多此豈非邪正相交一多雜現耶答曰諸佛大悲等故彌陀願力深故問曰一切諸佛三身同證悲智果圓亦應無二隨方禮念課稱一佛亦應得生何故偏歎西方專禮念等有何義也答曰諸佛所證平等是一若以行願來收非無因緣然彌陀世尊本發深重誓願願以光明名號攝化十方但使信心求念上盡一形下至十聲一聲等以佛願力易得徃生是故釋迦及以諸佛勸向西方為別異耳亦非是稱念餘佛不能除障滅罪也齊戒觀想彌陀佛觀音勢至二大士身生淨土坐蓮華十六觀經如是說十六觀經修持法門略云齋戒潔已清心淨慮面西安坐閉目默然觀想阿彌陀佛真金色身在西方七寶池中大蓮華上坐其身長丈六兩眉中間向上有白毫右旋轉光明照曜紫金色身以停心注想於白毫更不得妄有分毫他念當令閉目開目悉皆見之蓋欲念念不妄也如此久久念心成熟自然感應見佛全身此法最上謂心想佛時此心即是佛又過於口念也次觀想觀世音菩薩身紫金色手掌白蓮華其天冠中有一立化佛次觀想大勢至菩薩身紫金色其天冠肉髻上有一寶瓶次想自身生於西方極樂世界於蓮華中結跏趺坐作蓮華合想開想見佛菩薩滿虗空中今日道場同業大眾誠心諦聽稱讚淨土攝受經疏云念佛法門有二種謂心及口心為念體口為念相心念則深而難口念則淺而易皆是往生西方正行隨其根器有上下故今略指陳心口法或即為二門且心念者於寂靜處隨六時中供養禮讚行道畢已出道場來到所止處若欲入觀念佛之事若坐若立正面西向一心合掌十稱阿彌陀佛觀音勢至諸菩薩眾大悲名已發是願言弟子現是生死凡夫罪障深重輪迴六道若不可言今日遭遇真善知識得聞彌陀本願名號雖復稱念冀得往生奈以不識阿彌陀佛身相光明及觀音勢至二大菩薩願佛不捨本弘誓願慈悲攝受令弟子見或欲臥眠亦發此願而於夢中時得見之今日道場同業大眾普為一切求生行者相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無大音讚佛南無淨願佛南無日天佛南無樂慧佛南無攝身佛南無威德勢佛南無剎利佛南無得乘佛南無上金佛南無解脫髻佛南無樂法佛南無往行佛南無捨憍慢佛南無智藏佛南無梵行佛南無栴檀佛南無無憂名佛南無端嚴身佛南無相國佛南無蓮華佛南無無邊德佛南無天光佛南無慧華佛南無頻頭摩佛南無知富佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜三輩求生門捨家棄愛作沙門發菩提心修功德佛與大眾現其前即得住生安養國無量壽經云佛告阿難十方世界諸天人民其有至心願生彼國凡有三輩上輩者捨家棄欲而作沙門發菩提心一向專念無量壽佛修諸功德願生彼國臨壽終時無量壽佛與諸大眾現其人前即隨彼佛徃生其國便於七寶華中自然化生住不退地智慧勇猛神通自在是故阿難其有眾生欲於今世見無量壽佛應應無上菩提之心修諸功德願生彼國隨緣修善持齊戒懸繒散華然燈香身隨化佛生彼國住不退轉如上輩佛告阿難其中輩者十方世界諸天人民其有志心願生彼國雖不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛多少修善奉持齋戒起立塔像飯食沙門懸繪然燈散華然香以此迴向願生彼國其人臨終無量壽佛化現其身光明相好具如真佛與諸大眾現其人前即隨化佛徃生其國住不退轉功德智慧次如上輩者也若人十念或一念歡喜信樂不疑惑臨終夢佛亦往生功德次如中輩者佛告阿難其下輩者十方世界諸天人民其有志心欲生彼國假使不能作諸功德當發無上菩提之心一向專意乃至十念念無量壽佛願生其國若聞深法歡喜信樂不生疑惑乃至一念念於彼佛以志誠心願生其國此人臨終夢見彼佛亦得徃生功德智慧次如中輩者也今日道場同業大眾如佛所說無量壽經教修三輩求生行門相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無梵財佛南無寶手佛南無淨根佛南無具足論佛南無上論佛南無弗沙佛南無提沙佛南無有日佛南無出泥佛南無得智佛南無謨羅佛南無上吉佛南無法樂佛南無求勝佛南無知慧佛南無善聖佛南無綱光佛南無琉璃藏佛南無名聞佛南無利寂佛南無教化佛南無日明佛南無善明佛南無眾德上明佛南無寶德佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜九品求生門志誠深心迴向願不殺具戒誦大乘修行六念化佛迎是名上品上生者觀無量壽經云阿難及韋提希上品上生者若有眾生願生彼國者發三種心即得往生何等為三一者志誠心二者深心三者迴向發願心具三心者必生彼國復有三種眾生當得徃生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念迴向發願願生彼國具此功德一日乃至七日即得徃生彼國此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比丘聲聞大眾無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀音勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踊躍自見其身乘金剛臺隨從佛後如彈指項徃生彼國生彼國已見佛色身眾相具足見諸菩薩色相具足光明寶林演說妙法聞已即悟無生法忍經須臾間歷事諸佛徧十方界於諸佛前次第授記還到本國得無量百千陀羅尼門是名上品上生者不必受持方等經解第一義明因果紫金臺上見全身是名上品中生者經云不必受持讀誦方等經典若解義趣於第一義心不驚動深信因果不謗大乘以此功德迴向願求生極樂國行此行者命欲終時阿彌陀佛與觀世音大勢至無量大眾眷屬圍遶持紫金臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺合掌叉手讚歎諸佛如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開行者身作紫磨金色足下亦有七寶蓮華佛及菩薩俱時放光照行者身目即開明因前宿習普聞眾聲純說甚深第一義諦即下金臺禮佛合掌讚歎世尊經於七日應時即於阿耨多羅三藐三菩提得不退轉應時即能飛行徧至十方歷事諸佛於諸佛所修諸三昧經一小劫得無生忍現前授記是名上品中生者深信因果奉大乘但發無上菩提意聞法位登十地初是名上品下生者經云亦信因果不謗大乘發無上道心以此功德迴向願求生極樂國行者命欲終時阿彌陀佛及觀音勢至與諸眷屬持紫金蓮華化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝見此事時即自見身坐金蓮華坐已華合隨世尊後即得徃生七寶池中一日一夜蓮華分開七日之中乃得見佛雖見佛身於眾相好心不明了於三七日復乃了了聞眾音聲皆演妙法遊歷十方供養諸佛於諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者是名上輩生想名第十四觀受持五戒八戒齊修行諸戒迴向願見佛聞法證無學是名中品上生者經云若有眾生受持五戒持八齋戒修行諸戒不造五逆無諸過患以此善根迴向願生極樂世界臨命終時阿彌陀佛與諸比丘眷屬圍繞放金色光至其人所演說苦空無常無我讚歎出家得離眾苦行者見已心大歡喜自見己身坐蓮華臺長跪合掌為佛作禮未舉頭項即得往生極樂世界蓮華尋開當華敷時聞眾音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫是名中品上生者若人至心一日夜持戒持齊無破缺聞法即得須陀洹是名中品中生者經云若有眾生若一日一夜受持八戒齋若一日一夜持沙彌戒一日一夜持具足戒威儀無缺以此功德迴向願求生極樂戒香熏修如此行者命欲終時見阿彌陀佛與諸眷屬放金色光持七寶蓮華至行者前行者自聞空中有聲讚言善男子如汝善人隨順三世諸佛教故我來迎汝行者自見坐蓮華上蓮華即合生於西方極樂世界在寶池中經於七日蓮華乃敷華既敷已開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢是名中品中生者孝養父母行仁慈臨終復遇善知識化生一劫證無學是名中品下生者經云若有善男子善女人孝養父母行世仁慈此人命欲終時遇善知識為其廣說阿彌陀佛國土樂事亦說法藏比丘四十八願聞此事已尋即命終譬如壯士屈伸臂頃即生西方極樂世界生經七日遇觀世音大勢至聞法歡喜過一小劫成阿羅漢是名中品下生者是名中輩生想名第十五觀若人雖不謗尊經造眾惡業無慚愧化生十劫十地初是名下品上生者經云或有眾生作眾惡業雖不誹謗方等經典如此愚人多造惡法無有慚愧命欲終時遇善知識為說大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至行者前讚言善男子汝稱佛名故諸罪消滅我來迎汝作是語已行者即見化佛光明遍滿其室見已歡喜即便命終乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷時觀世音大勢至放大光明住其人前為說甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地是名下品上生者若有眾生犯眾戒盜取僧祇三寶物念佛忽託寶蓮中是名下品中生者經云若有眾生毀犯五戒及具足戒如此愚人偷僧祇物盜現前僧物不淨說法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄眾火一時俱至遇善知識以大慈悲為說阿彌陀佛十方威德廣讚彼佛光明神力亦讚戒定慧解脫知見此人聞已除八十億劫生死之罪地獄猛火化為清涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即得往生七寶池中蓮華之內經於六劫蓮華乃敷觀世音大勢至以梵音聲安慰彼人為說大乘甚深經典聞此法已應時即發無上道心是名下品中生者若作五逆十惡業應墮地獄受諸苦臨終念佛亦超昇是名下品下生者經云或有眾生作不善業五逆十惡具不善業如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此惡人臨命終時遇善知識種種安慰為說妙法教令念佛此人苦逼不遑念佛善友告言汝若不能念佛者應稱無量壽佛如此志心令聲不絕具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得徃生極樂世界於蓮華中滿十二大劫蓮華方開觀世音大勢至以大悲音聲為其廣說諸法實相除滅罪法聞已歡喜應時即發菩提之心是名下品下生者是名下輩生想名第十六觀今日大眾如佛所說十六觀經勸修九品求生行門相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無人月佛南無羅睺佛南無甘露明佛南無妙意佛南無炎明佛南無一切主佛南無樂智佛南無山王佛南無寂滅佛南無德聚佛南無天王佛南無妙音聲佛南無妙華佛南無住義佛南無功德威聚佛南無智無等佛南無甘露音佛南無善守佛南無利慧佛南無思解脫義佛南無音勝佛南無梨陀行佛南無善義佛南無無過佛南無行善佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜
