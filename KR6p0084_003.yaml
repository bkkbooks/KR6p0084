body:
  text: 引教比證第三夫引教比證者集佛祖語要採諸子文章削去繁蕪撮其精粹一言捷徑便出輪回六字法門直超生死依憑聖教方免沈淪耳今日道場同業大衆前已決疑生信釋然氷泮今復引教比證拂遣餘惑又復無始以來至於今日積惡如恆沙造罪滿大地捨身與受身不覺亦不知如是種種罪垢因緣無量無邊今日發露願乞除滅水懺略云先當興五種心以為方便然後此罪乃可得滅何等為五一者慚愧二者恐怖三者厭離四者怨親平等五者觀罪性空第一慚愧者自思我與釋迦如來同為凡夫而今世尊成佛以來已經爾所塵沙劫數我等相與耽染六塵輪回生死無有出期此實世間可慚可愧第二恐怖者既是凡夫身口意業常與罪相應以是因緣命終之後當墮地獄畜生餓鬼三塗惡道受無量苦如是實為可恐可怖第三厭離者相與常觀生死之中猶如車輪生老病死八苦交前無時暫息此身衆苦所集一切皆是不淨何有智者當樂此身生死既有種種惡法甚可厭離第四怨親平等者於一切衆生起慈悲心無彼我想何以爾者若見怨異於親即是分別以分別故起諸憎愛因違順緣造諸惡業惡業成熟故得苦果他以怨來己須親應於含毒者報之以恩應作是觀我昔惱君君今怒我我之宿罪縱使殺身亦合甘心而況怒耶假饒前世無罪今輒怨憎橫見欺陵應當思忖彼有智者欲令成就忍波羅蜜是我思師云何遭遇但應仰報豈敢懷違若無智者乃是悲田如母聞子返罵之時母轉歡心但更撫摩曾無慍色愍其癡小唯與深恩今亦如斯彼蓋煩惱內攻迷體密使性未狂歇力不自由以此悲心但垂拔救豈合念咎思以為讐若起違心與癡何異人欲強者推以為強人欲高者推以為高豈有違順憎愛於其間哉怨親平等矣第五觀罪性空者無有體相從因緣生顛倒而有既從因緣而生則從因緣而滅從因緣而生者狎近惡友造作不善從因緣而滅者即是今日洗心懺悔是故經言此罪性不在內不在外不在中間故知此罪本從空生六根本淨四大元空物我皆亡將何為苦欲除妄本須見靈源故了性空是真滅罪今日道場同業大衆從於今日乃至往生觀罪性空悉無障礙相與志心等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無二十五俱胝佛南無南方現在一切諸佛南無日月光佛南無名稱光佛南無大光蘊佛南無迷盧光佛南無無邊精進佛如是等佛如殑伽沙住在南方廣舌稱讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆各各志誠善攝心聽古今佛祖勸修西方無盡法門釋迦教主偏讚法門今日道場同業大衆賢護經云假使有人以七寶滿十方微塵數三千大千世界以用布施復以衣服飲食四事供養一切衆生皆令得至阿羅漢果其福多不賢護白言世尊其福甚多佛告賢護不如有人勸令稱念一聲阿彌陀佛功德即過於彼勸他既爾何況自念一聲尚爾何況多耶又陀羅尼集經云若四部衆將持七寶滿世界中布施十方一切諸佛不如有人以一錢一香一華好心供養阿彌陀佛作此功德者一切諸佛及諸菩薩金剛天等皆悉歡喜死生阿彌陀佛國若人然燈供養阿彌陀佛命終生彼佛國即得天眼徹見十方一切世界陀羅尼集經云若轉輪王十萬歲中滿四天下七寶布施十方諸佛不如有人一彈指頃坐禪以平等心憐愍一切衆生念阿彌陀佛功德死生彼國救阿難焰口陀羅尼經云諸佛子等若聞阿彌陀如來名號能令汝等往生西方極樂淨土蓮華化生得不退地藥師經云若淨信男女有能受持八方齊戒或經一年或經三月以此善根願生西方極樂世界有未定者若能聞我藥師琉璃光如來名號臨命終時有八菩薩乘神通來示其道路即於西方極樂世界寶蓮華中自然化生今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無梵天佛南無不退轉輪成首佛南無大興光王佛南無法種尊佛南無日月燈明佛南無須彌佛南無大須彌佛南無超出須彌佛南無香像佛南無圍繞香熏佛南無淨光佛南無香自在王佛南無大集佛南無香光明佛南無大光佛南無無量光明佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩南無佛陀南無達摩南無僧伽又復歸依如是西方盡虗空界一切三寶無量賢聖一拜馬鳴論主起信法門大乘起信論云如修多羅說若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定故今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無開光明佛南無月燈光佛南無月光佛南無日月光明佛南無火光明佛南無集音佛南無最威儀佛南無光明尊佛南無蓮華軍佛南無蓮華響佛南無多寶佛南無師子吼佛南無師子音佛南無精進軍佛南無金剛踊躍佛南無度一切禪絶衆疑佛南無寶大侍從佛南無無憂佛南無地力持勇佛南無最踊躍佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜坦淵記主甘露法門甘露疏記第一云念佛求生淨土者與初心泛修餘善者優劣不同泛修餘善者唯依自力要經多劫修行不退方獲聖果則甚為難念佛求生淨土者依阿彌陀佛願力攝持不捨則少有退墮甚為易也譬如二人皆欲渡海往詣寶山一人則種植樹木待以為船欲使樹成甚為久遠多諸障難不能得渡自力泛修餘善者亦復如是一人則於海岸上遇大商主有大船舶以柔軟語告大商主憐愍聽許即時登船不歷久遠得至寶所依阿彌陀願力攝持念佛求生淨土者亦復如是又云從昔無量劫來常受苦惱一一衆生一劫之中所積身骨如王舍城毗富樓山所飲乳汁如四大海水身所出血多四大海水父母等命終哭泣所出目淚多四海水沈生曠劫不遇覺王且佛出中天舍衛三億人不見不聞震旦一方不知不覺三塗八難障重難逢諸佛希出世處難無緣值雖生不值佛而慶遇此經慈覺長老語録法門勸化文云蓋以初心入道忍力未淳須託淨緣以為增上何則娑婆國土釋迦已滅彌勒未生極樂世界彼二上人親為勝友娑婆國土諸魔竟作惱亂行人極樂世界大光明中决無魔事娑婆國土邪聲雜亂女色妖淫極樂世界水鳥樹林咸宣妙法正報清淨無實女人然則修行緣具無若西方淺信之人橫生疑謗竊嘗論之此方之人無不厭俗舍之喧煩慕蘭若之寂靜故有捨家出家則殷勤讚歎而娑婆衆苦何止俗舍之喧煩極樂優游豈直蘭若之寂靜知出家為美而不願往生其惑一也萬里辛勤遠求知識者蓋以發明大事决擇死生而彌陀世尊色心業勝願力弘深一演圓音無不明契願參知識而不欲見佛其惑二也叢林廣衆皆樂棲遲少衆道場不欲依附而極樂世界一生補處其數甚多諸上善人俱會一處既欲親近叢林而不慕清淨海衆其惑三也此方之人上壽不過百歲而童癡老耄疾病相仍昏沉睡眠常居太半菩薩猶昏隔陰聲聞尚昧出胎則尺璧寸陰十喪其九而未登不退可謂寒心西方之人壽命無量一託蓮苞更無死苦相續無間直至菩提所以便獲阿惟越致佛階决定可期流轉娑婆促景迷於淨土長年其惑四也若乃位居不退果證無生在欲無欲居塵不塵方能興無緣慈運同體悲回入塵勞和光五濁其有淺聞單慧或與少善相應便為逈出四流高超十地抵訶淨土耽戀娑婆掩目歸空宛然流浪並肩牛馬接武泥犁不知自是何人擬比大權菩薩其惑五也故經云應當發願願生彼國則不信諸佛誠言不願往生淨土豈不甚迷哉古德云念佛一門有七種勝一詞少易行勝二念緣佛境勝三離難獲安勝四稱名滅罪勝五持念獲福勝六果感見佛勝七親迎往生勝彌陀十勝一能滿所求勝二親迎往生勝三蒙光超世勝四聞名得法勝五聞名轉質勝六聞名修敬勝七聞名證果勝八聞名受生勝九聞名具德勝十聞名不退勝淨土十勝一生值三寶勝二速得勝法勝三生得身相勝四無惡唯善勝五無苦純樂勝六所須隨念勝七壽命長遠勝八修行不退勝九國非界繫勝十國土莊嚴勝往生十勝一經說易生勝二時但少修勝三聖衆護念勝四光明攝受勝五乘佛願力勝六化主親迎勝七諸佛證明勝八能滅衆罪勝九衆經共讚勝十法滅獨行勝又往生十易一信解發心得生易二隨修少善得生易三凡修一觀得生易四慈光願攝得生易五諸教讚勸得生易六諸佛讚勸得生易七衆聖加護得生易八二聖化攝得生易九念滅衆罪得生易十臨終聖迎得生易今日道場同業大衆如上所說佛祖大慈悲心垂語勸生念佛法門我等應當相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無自在王佛南無無量音佛南無定光明佛南無寶光明佛南無寶蓋照空佛南無妙寶佛南無諦幢佛南無梵幢佛南無阿彌陀佛南無殊勝佛南無集音佛南無金剛步精進佛南無自在王神通佛南無寶火佛南無淨月幢稱光明佛南無妙樂佛南無無量幢幡佛南無無量幡佛南無大光普遍佛南無寶幢佛南無淨光佛南無寶王佛南無樹根華王佛南無維衛莊嚴佛南無開華菩薩佛南無見無恐懼佛南無一乘度佛南無德內豐嚴王佛南無金剛堅強消伏壞散佛南無寶火佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜香山居士誓願法門白蓮集云香山居士白居易字樂天作畫西方幀記誓願云弟子居易焚香稽首跪於佛前起慈悲心發弘誓願願此功德回施一切衆生有如我老者如我病者願皆離苦得樂斷惡修善不越南部便覩西方白毫大光應念來感青蓮上品隨願往生從現在身盡未來際常得親近而供養也欲重宣此願而偈讚云極樂世界清淨土無諸惡道及衆苦願如老身病苦者同生無量壽佛所唐李太白讚序法門白蓮集云唐李白字太白作金泥畫西方淨土變相并序云我佛金天之西日沒之所去中華十萬億剎有極樂世界焉彼國之佛身長六十萬億由旬眉間白毫向右宛轉如五須彌山目光清白若四海水端坐說法湛然長存沼明金沙岸列珍樹羅網彌覆欄楯周帳硨磲琉璃為樓殿之飾玻瑪瓈瑙耀階砌之榮皆諸佛所證無虗言者若已發願求及發願若已當生來及當生精念七日必生其國功德罔極灼然難名讚曰向西日沒處遙瞻大悲顏目淨四海水身光紫金山勤金必往生是故稱極樂珠網珍寶樹天花散香閣圖畫了在眼願託彼道場以此功德海冥佑為舟梁八十億劫罪如風掃輕霜庶觀無量壽長覩玉毫光東坡居士偈頌法門白蓮集云東坡居士蘇軾字子瞻讚阿彌陀頌曰佛以大圓覺充塞恆沙界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓槖雖有大聖智亦不能分別願我先父母與一切衆生在處為西方所遇皆極樂人人無量壽無往亦無來楊無為子序讚法門决疑集無為子楊傑字次公作序云華嚴解脫長者云知一切佛猶如影像自心如水彼諸如來不來至此我不往彼我若欲見安樂世界阿彌陀如來隨意即是知衆生注念定見彌陀彌陀來迎極樂不遠乃稱性實言非權教也淨土無欲池欲界也其國地居非色界也生有形相非無色界也一切衆生未寤正覺處大夢中六道升沈未嘗休止諸天雖樂報盡相衰修羅方瞋戰爭玄勝傍生飛走噉食相殘鬼神幽陰飢渴困逼地獄長夜痛苦號呼得生人趣固已為幸然而生老病死衆苦縈纏唯是淨方更無諸苦蓮苞託質無生苦也寒暑不遷無老苦也壽命無量無死苦也無父母妻子無愛別離也上善人聚無怨憎會也華裓香食彌寶受用無求不得無窮苦也觀照空寂無蘊苦也悲惠有情欲生則生不住寂滅非二乘也智照生死則不退轉非凡夫也若生彼土則無諸惱不聞知者固可哀憐亦有善士發三種不信心不求生者尤可嗟惜一曰吾當超佛越祖淨土不足生也二曰處處皆淨土西方不必生也三曰極樂聖域我輩凡夫不能生也夫行海無盡普賢願見彌陀佛國雖空維摩常修淨土十方如來有廣舌之讚十方菩薩有同往之心試自忖量孰與諸聖謂不足生者何自欺哉至如龍猛祖師也楞伽經有預記之文天親教宗也無量論有求生之偈彼皆上哲精進往生謂不必生者何自慢哉火車可滅舟名不沈現華報者觀甚於張十念而超勝處入地獄者莫速於雄俊再蘇而證妙因世人愆尤未必若此謂不能生者何自棄哉般舟三昧經云跋陀和菩薩諸問釋迦佛未來衆生云何得見十方諸佛佛教令念阿彌陀佛即見十方一切諸佛又大寶積經云若他方衆生聞無量壽如來名號乃至能發一念淨信歡喜愛樂所有善根回向願生無量壽國者隨願皆生得不退轉此皆佛言也不信佛言何言可信不生淨土何土可生自欺自謾自棄己靈流入輪回是誰之咎今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無寶月光明佛南無賢最佛南無寶蓮華步佛南無壞魔羅網獨步佛南無師子吼力佛南無悲精進佛南無金寶光明佛南無無量尊豐佛南無無量尊離垢王佛南無德首佛南無無數精進興豐佛南無無言勝佛南無無愚豐佛南無月英豐佛南無無異光豐佛南無逆空光明佛南無最清淨無量幡佛南無好諦住唯王佛南無成就一切諸剎豐佛南無淨慧德豐佛南無淨輪幡佛南無琉璃光最豐佛南無寶德步佛南無最清淨德寶佛南無度寶光明塔佛南無無量慚愧金最豐佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜孝祥狀元序引法門狀元張待制作龍舒淨土文序云阿彌陀佛如來以大願力攝受群品繫念甚簡證果甚速或者疑之余嘗為之言阿彌陀佛即汝性是極樂國土即汝心是衆生背覺合塵淪於七趣立我與佛天地懸隔佛為是故慈悲方便開示悟入現諸無量如幼三昧莊嚴其國備極華好後以辨智而為演說令諸衆生歡喜愛樂於日用中能發一念念彼如來欲生其國即此一念清淨堅固還性所有與佛無異當念是時不起於坐阿彌陀佛極樂國土皆悉現前如是修習乃至純熟幻身壞時此性不壞金蓮華臺由性種生往生其中如歸吾廬諸佛菩薩即我眷屬性無異故自相親愛友人龍舒王虗中端靜簡潔博通群書訓傳六經諸子數十萬言一旦指之曰是皆業習非究竟法吾其惟西方之歸自是精進唯佛是念年且六十布衣蔬茹重趼千里以是教人風雨寒暑弗遑暇恤間居曰課千拜夜分乃寢面目奕奕有光望之者言其淨土文凡修習法門與感驗章著具有顛末將求信道者鋟木傳焉委余序其書故為之題其端云虗中名日休十月旦歷陽張孝祥序龍舒虗中淨土法門店邸雨具勸預求生龍舒淨土文略云譬如入大城中必先覔安下處却出幹事柢暮昏黑則有投宿之地先覔安下處者修淨土之謂也抵暮昏黑者大限到來之謂也有投宿之地生蓮華中不落惡趣之謂也又如春月遠行先備雨具驟雨忽至則無淋滴狼狽之患先備雨具者修淨土之謂也驟雨忽至者大命將盡之謂也無淋滴狼狽之患者不至沈論惡趣受諸苦惱之謂也且先覔安下處者不害其幹事先備雨具者不害其行遠塗是修淨土者皆不妨一切世務人何為而不修乎豫一相識平生多殺魚之罪晚年得疾有似中風豫憐其罪惡疾苦乃往見之勸念彌陀堅不肯念但與豫說雜話豈非為惡業所障疾病所昏已不能回心念善閉眼之後將奈之何故修此者宜急早回首也世間晝必有夜寒必有暑人所共知不可隱者若曰生必有死人乃諱之不肯說出何大蔽也蓋不知所謂我者初不曾死唯業緣盡而去年故不可不修淨土以求蓮華中生而受清虗之身無極之壽以脫一切生死苦惱也佛示阿難勸凡求生龍舒云大阿彌陀經釋迦佛一日容顏異常侍者阿難怪而問之佛言善哉所問者勝於供養一天下聲聞緣覺及布施諸天人民以至蜎飛蠕動之類雖至纍劫猶百千萬倍不可以及所以者何以諸天帝王人民乃至蜎飛蠕動之類皆因汝所問而得度脫之道以此觀之是釋迦佛初欲說阿彌陀佛之時其存於心而形於色者已異於平日則阿彌陀佛所以感諸佛者固以非常況於感一切衆生者乎及阿難問而告之則為諸天帝王人民以至蜎飛蠕動之類皆因汝所問而得度脫之道是上自諸天下至蠕動皆同在三界之內故不出輪回是以未為得度脫者阿彌陀大願力無所不度故皆度脫之也觀其初發願偈云我至成佛時名聲超十方人天欣得聞俱來生我剎地獄鬼畜生亦生我剎中是則凡在三界六道輪回之內者無所不度是以此經云阿彌陀佛現在西方極樂世界又在十方世界教化無央數諸天人民以至蜎飛𧑮動之數莫不得過度解脫者蜎飛謂微細飛蟲也𧑮動謂微細蛆蟲也若此者佛尚化度況於人乎是其所以廣度衆生無有窮極而人一念歸依遂生其國無足疑也現禾俱益勸俗求生淨土之說多見於日用之間而其餘功乃見於身後不知者止以為身後之事而已殊不知大有益於生前也何則佛之所以訓人者無非善與儒教之所以訓人何以異哉唯其名有不同耳故其以淨土為心則見於日用之間者意之所念口之所言身之所為無適而非善善則為君子為大賢現世則人敬之神佑之福祿可增壽命可延由是言之則從佛之言而以淨土為心者孰謂無益於生前乎其次為業緣所奪而不能專心志於此苟有志焉者亦惡緣自此而省善緣可以自此而增惡緣省而不已終必至於絶其惡善緣增而不已終必至於純乎善惡既絶矣善既純矣非為君子而何非為大賢而何由是言之則從佛之言而以淨土為心者孰謂無益於生前乎又其次不知禮義之所在不知刑罰之可畏唯氣力之為尚唯勢利之為趨苟知以淨土為心則亦必知省己而自咎所謂雖不能皆合於禮義亦必近於禮義矣雖不能盡超乎刑罰亦必遠於刑罰矣漸可以脫小人之域而終為君子之歸庸人稱知佛理者世人目為善人此其效也由是言之則從佛之言而以淨土為心者孰謂無益於生前乎或曰從孔子之言而以儒教為心豈不益於生前何必淨土哉曰此世間法耳非出世間法世間法則不出於輪回出世間法則直脫輪回之外淨土既益於生前又益於身後者以其兼出世間法故也因少果多勸衆求生修持法門有九品人人皆可以修雖罪惡之人佛亦不棄回心向善則為善矣故此十念法門人皆可以通行譬如久為暗室一燈照之則明矣故雖殺牛屠馬之人放下屠刀亦可以修者不難亦不妨一切俗事故在官不妨職業在士不妨修讀在商賈不妨販賣在農人不妨耕種在公門不妨幹事在僧不妨禪誦凡一切所為皆不相妨故曰其修持功夫見於早辰一茶之頃耳遂可以為萬萬劫不壞之資人何為而不修乎今有販物者一錢而得兩錢之息則必自喜以為得息之多矣行路者一日而及兩日之程亦必自喜以為及程之多矣是於外物小有所得而知其喜也或兩錢而得一錢之價必憂之以為喪本兩日而及一日之程亦必憂之以為費日是於外物小有所失而知其憂也何於吾身之光陰有限則泪沒以過其失大矣而不以為憂於淨土之因緣難遇幸而知之其得大矣而不以為喜是徒見小得小失而知其憂喜及得失之大者則不能知何不思之甚也況不費時刻用力甚少而收切有不可盡言者何為而不修乎此而不修可痛惜哉可痛惜哉比校優劣勸迷求生人驟聞淨土之景像多不信之無足怪也蓋拘於目前所見遂可謂目前所不見者亦如此而已且如陋巷糞壤之居者安知有廣夏之清淨小器藜藿之食者安知有食前之方丈弊篋錙銖之蓄者安知有天府之充溢故處娑婆濁世不信有清淨佛土所以生長於胞胎不知彼有蓮華之化生壽不過百年不知彼有河沙之壽數衣食必由於營作不知彼有自然之衣食快樂常雜於憂惱不知彼有純一之快樂然則佛之所言不可以目前所不見而不信也況佛切誡人以妄語必不自妄語以誑人世人妄語者非以規利則避害佛無所求於世何規利之有佛視生死如刀斫虗空何避害之有是佛無所用其妄語也世間中人已上者猶不肯妄語以喪其行止況佛乎其言可信無足疑也雙明十戒勸儒求生儒者或以釋氏之徒無戒行故輕其教而因以不信淨土是不然豈可以道士不肖而輕老子士人不肖而輕孔子智者尚不以人廢言況可以其徒而輕其教乎釋氏之教有世間法有出世間法其世間法與吾儒同者不可以縷數姑舉其大者言之釋氏可以考考訓世人者無非誡惡勸善而吾儒何嘗不誡惡勸善哉且以目前言之佛以殺生偷盜邪淫為身三業而孔子言勝殘去殺詩人言文王德及鳥獸昆蟲是豈不誡殺哉盜固不在所言矣孔子言吾未見好德如好色者詩人刺不好德而悅美色是豈不誡邪淫哉佛以妄言綺語兩舌惡口為口四業孔子謂人而無信不知其可豈不誡妄言也謂巧言令色鮮矣仁豈不誡綺語也書稱爾無面從退有後言豈不誡兩舌也惡口謂之惡怒之聲尚未至於穢語荀子謂傷人之言深於矛戟見未嘗不誡惡怒之口也佛又以貪嗔癡為意三業孔子謂見得思義是則誡貪矣謂伯夷叔齊不念舊惡是則誡嗔矣謂困而不學民斯為下是則誡癡矣由此言之儒釋未嘗不同也其不同者唯儒家止於世間法釋氏又有出世間法儒家止於世間法故獨言一世而歸之於天釋氏又有出世間法故知纍世而見衆生業緣之本末此其所不同耳欲知釋氏之所長須看楞嚴楞伽圓覺無蓋障菩薩所問經及曉金剛經之理未能如是而遂非之則孔子所謂不知而作之者可不誡哉誠如是則釋氏為可信矣其言淨土烏可以不信哉所謂出世間法淨土尤其要者不可以不勀也勤修須斷勸執求生世有專於執著者云唯心淨土豈復更有淨土自性彌陀不必更見彌陀此言似之而非也何則西方淨土有理有迹論其理則能淨其心故一切皆淨誠為唯心淨土矣論其迹則實有極樂世界佛叮嚀詳復言之豈妄語哉人人可以成佛所謂自性彌陀者固不妄矣然卒未能至此譬如哀材可以雕刻物象極其華麗必加以雕刻之功然後能成不可遽指良材而遂謂物象之華麗也是所謂唯心淨土而無復更有淨土自性彌陀不必更見彌陀者非也又或信有淨土而泥唯心之說乃謂西方不足生者皆失之矣何則此言甚高且恐不易到古人云見道方修道又云單輪不運隻翼不飛又解行相應名之曰祖圭峰云佛本是而勤修惑元無而須斷祖師云若有纖毫習漏不盡未免銜鐵負鞍償他去在然吾心可以為淨土而卒未能為淨土吾性可以為阿彌而卒未能為阿彌烏得忽淨土而不修捨阿彌而不欲見乎大阿彌陀經云十方有無量菩薩往生阿彌陀國彼菩薩尚欲往生我何人哉不欲生彼是果勝於諸菩薩乎今日道場同業大衆自白居易至王虗中先世名儒皆有讚歎西方法門我輩應當相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無蓮華尊豐佛南無淨寶興豐佛南無電燈幡王佛南無法空燈佛南無一切衆德成佛南無賢幡幢王佛南無一切寶緻色持佛南無斷疑拔欲除冥佛南無意無恐懼威毛不竪佛南無師子佛南無名𫁉遠聞佛南無法名號佛南無奉法佛南無法幢佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆色身難保趁康健時辦此大事應常作念云吾曹自無始以來輪回六道不曾知此法門故不得出離今日知之豈可不即時下手年高者固當勉力年少者不可因循三教同修九流共往命終往生極樂世界回視死入陰府受恐怖者不可同年而語矣以大慈悲救護六道一切衆生從今已去至於往生願弟子某甲等承是懺悔貪嗔癡等一切煩惱深識三界猶如牢獄四大毒蛇五陰怨賊拔疑惑根斷無明源正向涅槃不休不息十波羅蜜常得現前懺悔已志心敬禮常住三寶粹雖遂切泮音判慍於問切八分下上舶音白耄音冒抵音底謫音摘軾音式槖音託裓古德切馗音逵廬音閭茹音汝趼音繭恤音戌奕音亦鋟音侵邸音底幹古案切驟鋤祐切漓呂支切狽音貝蜎音淵蠕音軟壤如兩切錙音之銖音殊孜音茲戟居逆切
