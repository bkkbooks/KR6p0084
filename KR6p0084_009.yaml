body:
  text: 求生行門之餘若人端坐正西向九十日中常念佛能成三昧生佛前文殊般若如是説若人專念一方佛或行或坐七七日見身見佛即往生大集經中如是説十日十夜求齊戒懸繒幡蓋然香燈繫念不斷得住生無量壽經如是説十日十夜六時中五體禮念不斷絶現見彼佛即往生鼓音王經如是説一日二日若七日執持名號心不亂佛現其前即往生阿彌陀經如是説今日大衆如經所説求生行門相與至心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無華藏佛南無妙光佛南無樂説佛南無善濟佛南無衆王佛南無離畏佛南無辨才日佛南無名聞佛南無寶月明佛南無上意佛南無無畏佛南無大見佛南無梵音佛南無善音佛南無慧濟佛南無無等意佛南無金剛軍佛南無菩提意佛南無樹王佛南無槃陀音佛南無福德力佛南無勢德佛南無聖愛佛南無勢行佛南無琥珀佛南無雷音雲佛南無善愛目佛南無善智佛南無具足佛南無德積佛南佛大音佛南無法相佛南無智音佛南無虗空佛南無祠音佛南無慧音差別佛南無功德光佛南無聖王佛南無衆意佛南無辨才輪佛南無善寂佛南無月面佛南無日名佛南無無垢佛南無功德集佛南無華德相佛南無辨才國佛南無寶施佛南無愛月佛南無不高佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜若人聞彼阿彌陀一日持念至二日繫念現前即往生般舟經中如是説晝夜一日稱佛名殷勤精進不斷絶展轉相勸同往生大悲經中如是説一日一夜懸繒蓋專念往生心不斷臥中夢佛即往生無量壽經如是説今日大衆如經所説求生行門相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無師子力佛南無自在王佛南無無量淨佛南無等定佛南無不壞佛南無滅垢佛南無不失方便佛南無無嬈佛南無妙面佛南無智制住佛南無法師王佛南無大人佛南無深意佛南無無量佛南無法力佛南無世供養佛南無華光佛南無三世供佛南無應日藏佛南無天供養佛南無上知人佛南無真髻佛南無信甘露佛南無金剛佛南無堅固佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜住大乘者清淨心十念念彼無量壽臨終夢佛定往生大寶積經如是説五逆地獄衆火現值善知識發猛心十念稱佛即往生十六觀經如是説若有歡喜愛樂心下至十念即往生若不爾者不成佛四十八願如是説今日大衆如經所説求生行門相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無寶扇明佛南無梨陀步佛南無隨日佛南無清淨佛南無明力佛南無功德聚佛南無具足眼佛南無師子行佛南無高出佛南無華施佛南無珠明佛南無蓮華佛南無愛智佛南無槃陀嚴佛南無不虗行佛南無生法佛南無相好佛南無思惟樂佛南無樂解脫佛南無知道理佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜諸有聞名生志心一念回向即往生唯除五逆謗正法無量壽經如是説臨終不能觀及念但能生意知有佛此人氣絶即往生大法鼓經如是説若人念佛生疑惑住在疑城五百年猶勝天宮無退墜彌陀大經如是説大彌陀經云佛言其人作是以後若復中悔心意狐疑不信作善後世當得其福不信往生阿彌陀佛國其人雖爾續得往生其人壽命病欲終時阿彌陀佛即令其人於臥止夢中見阿彌陀佛土心大歡喜意自念言我悔不知益作諸善今當往生阿彌陀佛國其人但念口不能復言即自悔過者疑若減少悔無所及其人命終即生阿彌陀佛國不能得前至便道見二千里七寶城中心獨歡喜便止其中亦復於七寶浴池蓮華中化生即自然受身長大其城如第二忉利天上自然之物其人亦復於城中五百才竟乃得出至阿彌陀佛所心中大喜其人聽經心不開解意不歡樂智慧不明知經復少所居舍宅在地不能令舍宅隨意高大在虗空中復去阿彌陀佛大遠不能得近其人久久亦當智慧開解知經勇猛心當歡喜次如上等一輩也所以者何皆坐前世宿命求道時中悔狐疑暫信暫不信不信作善得其福德皆自然得之耳今日大衆大經所説求生行門相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無多聞海佛南無持華佛南無不隨世佛南無喜衆佛南無孔音佛南無不退沒佛南無斷有愛垢佛南無威儀濟佛南無諸天流布佛南無寶步佛南無華手佛南無威德佛南無破怨賊佛南無富多聞佛南無妙國佛南無華明佛南無師子知佛南無月出佛南無滅暗佛南無無動佛南無次第行佛南無福德燈佛南無音聲治佛南無憍曇佛南無勢力佛南無身心住佛南無善月佛南無覺意華佛南無上吉佛南無善威德佛南無知力德佛南無善燈佛南無堅行佛南無天音佛南無安樂佛南無日面佛南無樂解脫佛南無戒明佛南無住戒佛南無無垢佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆甘露疏云善言慰論令心歡喜者四分律云為病人説法令其歡喜十誦律云應隨病者先所習學而讚歎之不得毀呰退本善心隨願住生經云佛告普廣菩薩四輩弟子臨終之日願生十方佛剎者先當洗浴身體著鮮潔衣燒衆名香懸繒幡蓋歌讚三寶讀誦尊經為病人説因緣譬諭善巧言詞微妙經義苦空非實四大假合隨心所願無不獲果言心緣佛像者若無苦心明者令緣真佛身相相好光明等若為苦逼心亂者設像令緣口稱佛號準西域祇園寺圖云寺西北角日光沒處為無常院若有病者安置在中堂號無常多生厭世去者極衆盡生西方其堂內安一彌陀佛像金薄塗之面向果方當置病人在像前坐若無力者令病人臥面向西方觀佛相好其像手中繫一五色綵幡令病人手執幡腳作往生淨土之意像前燒香散華供養不絶生病人善心言屬稱十念聲聲相續令高聲稱念藉聲束心使心不散故大集經大莊嚴論皆説高聲念佛有十種功德一能排睡眠二天魔驚怖三聲遍十方四三塗息苦五外聲不入六念心不散七勇猛精進八諸佛歡喜九三昧現前十往生淨土然念通四儀約勝劣為上下謂以行住坐為上唯臥為下又沐浴新衣盥漱焚香息緣靜坐對佛合掌念持為上反此為下又定念為上散念為下又有二種一未終時念或定或散容可涉緣二臨終時念須屏絶諸緣一心專注若心境差違別為誤失故化十念也今日道場幽顯大衆善攝心耳志誠諦聽經教略云於其象生若墮地獄三塗等趣有一罪人在世之日曾讀彌陀往生經教稍知宿命因緣果報覩此光明心中默念我等受苦皆因前世造諸罪業招此苦報於三塗中經無數載冥冥長夜應無此光必是西方極樂阿彌陀佛所放光明救度於我遂謂衆曰我等生世惡業深重不知經教不識正法信邪倒見欺罔幽明故受此苦無由出離我等幸遇獲瞻此光可隨吾念彌陀聖號懇切志誠願離此苦一切罪人聞是語已瞻禮光明應聲齊念南無阿彌陀佛如是志心令聲不絶具足十念冥官獄吏不能禁止牛頭獄卒變成善人須臾之間枷鎖能脫彌陀接引乘空而去皆得往生西方淨土又大經云彼佛光明有十二號無量光佛無邊光佛無礙光佛無對光佛焰王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛無稱光佛超日月光佛彼佛光明照十方圓無所障礙若有像生遇斯光者三垢消滅身心柔軟歡喜踊躍善心生焉若在三塗勤苦之處見此光明皆得休息壽終之後皆蒙解脫今日道場幽顯大衆重復志誠一心諦聽彌陀經教直訣略云若有衆生新亡舊化已墮地獄餓鬼傍生三塗等趣惡業深重不遇佛光或有一人高聲唱言語諸罪人勿得恐怖我憶宿命在人間時曾讀彌陀度生經教往生淨土直訣法門分明廣説若人臨終合掌向西志心化念南無阿彌陀佛六字法門一聲能滅八十億劫生死重罪十聲能滅八百億劫生死重罪縱有千劫生死重罪十念具足滅盡無餘彌陀決定將諸聖衆親來迎接若不如願誓不成佛又於因中為法藏比丘初發願偈曰我至成佛時名聲超十方人天欣得聞俱來生我剎地獄鬼畜生亦生我剎中昔者法藏成佛已竟號阿彌陀酬願度生今正是時我等命終現墮三塗惟願西方阿彌陀佛天眼見我天耳聞我他心知我大慈大悲不違本願接引我等離苦得樂速生淨土佛語可憑必無妄説於是罪人為苦所逼發勇猛心雨淚交流異口同音齊聲化念南無阿彌陀佛具足十聲又復禮拜未舉頭頃彌陀現前一切罪人枷鎖解脫蒙佛願力隨化佛後如一念頃即得往生極樂世界無量壽莊嚴經上卷説阿彌陀佛昔發誓言證得菩提所居佛剎具足無量不可思議功德莊嚴所有一切衆生及琰魔羅界三惡道中地獄餓鬼畜生皆生我剎受我法化乃至一生令得阿耨多羅三藐三菩提今日道場同業大衆普皆奉為若幽若顯求生行者等一痛切相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無堅出佛南無安闍那佛南無增益佛南無香明佛南無違藍明佛南無念王佛南無蜜鉢佛南無無礙相佛南無信戒佛南無至妙道佛南無樂實佛南無明法佛南無具威德佛南無至寂滅佛南無上慈佛南無大慈佛南無甘露主佛南無彌樓明佛南無聖讚佛南無廣照佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆求生行門所生功德惟願阿鼻鐵城即時破壞悉為淨土無惡道名其餘地獄一切苦具轉為樂緣刀山釰樹變為寶林鑊湯爐炭化成塗香牛頭獄卒皆起慈悲無有惡念地獄衆生得離苦果不造業因等受安樂如第三禪一時俱發無上道心速歸極樂更願四生六道一生衆生念惡道苦發菩提心同生淨土當成正覺總為禮佛第十今日道場同業大衆前説求生行門自利已竟次總禮佛專乃利他夫總為禮佛者普賢十願禮敬為先天親四修歸依為首故我世尊慈悲願重喜捨心增標指西方勸修淨業顯壽光之無量明依正之難思餘經盡而獨留廣舌覆而同讚故得人天共仰凡聖同歸蓋以利自利他益存益亡運菩薩心嚴諸佛土固宜勇猛代為一切若幽若顯六趣四生無量有情相與志心五體投地歸依世間大慈悲父一心敬禮過去久遠劫中南無定光佛南無日光佛南無月光佛南無栴檀香佛一心敬禮娑婆教主釋迦牟尼佛一心敬禮世自在王佛一心敬禮西方阿彌陀佛一心敬禮助成往生藥師琉璃光佛一心敬禮六方諸佛一心敬禮東方世界南無阿閦佛南無須彌相佛南無大須彌佛南無須彌光佛南無妙音佛一心敬禮南方世界南無日月燈佛南無名聞光佛南無大焰肩佛南無須彌燈佛南無無量精進佛一心敬禮西方世界南無無量壽佛南無無量相佛南無無量幢佛南無大光佛南無大明佛南無寶相佛南無淨光佛一心敬禮北方世界南無𦦨肩佛南無最勝音佛南無難阻佛南無日生佛南無網明佛一心敬禮下方世界南無師子佛南無名聞佛南無名光佛南無達摩佛南無法幢佛南無持法佛一心敬禮上方世界南無梵音佛南無宿王佛南無香上佛南無香光佛南無大𦦨肩佛南無雜色寶華嚴身佛南無娑羅樹王佛南無寶華德佛南無見一切義佛南無如須彌山佛如是等六方恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經一心敬禮極樂世界文殊師利菩薩普賢菩薩一心敬禮極樂世界觀世音菩薩大勢至菩薩彌勒菩薩一心敬禮極樂世界一生補處諸大菩薩一心敬禮極樂世界馬鳴菩薩龍樹菩薩一心敬禮極樂世界阿跋致菩薩一心敬禮極樂世界新發道意及十方來生淨土一切清淨大海衆菩薩一心敬禮極樂世界長老舍利弗摩訶目揵連摩訶迦葉等諸大聲聞一切賢聖一心敬禮梵釋四王金剛天等諸護法衆今日道場同業大衆以今懺悔發心禮佛功德普願十方盡虗空界一切天主一切諸天梵王帝釋護世四天王日月星辰主方主火主稼主林等各及眷屬又願難陀龍王跋難陀龍王等又願阿修羅王各及眷屬又願人道一切人王臣民將帥及其眷屬又願十方比丘比丘尼式叉摩那沙彌沙彌尼及其眷屬又願閻羅王界一切地獄餓鬼道畜生道一切衆生及其眷屬又願十方盡虗空界窮未來際若大若小一切衆生及其眷屬以今禮佛功德因緣皆令獲得三業清淨發菩提心證解脫道某甲等仰承阿彌陀佛大誓願力諸大菩薩一切賢聖修行願力無量無盡智慧力功德力自在神通力覆護衆生力安慰衆生力盡諸天諸仙漏力攝化一切善根力救拔地獄衆生力救度一切餓鬼力免脫一切畜生力令諸衆生得如是願某甲等始自歸依三寶終至禮佛功德善根勝因令諸衆生得如所願某甲等又承三世諸佛西方阿彌陀佛大慈悲力十方諸佛大慈心力六方諸佛大悲心力三十五佛滅煩惱力五十三佛降伏魔力百七十佛度衆生力千佛攝受諸衆生力九十九俱胝佛成就力觀音普賢流通懺法力令諸衆生得如所願今日道場同業大衆如是普為十方法界四生六道或聖或凡若幽若顯一切眷屬無量衆生總為禮佛相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛佛無西方阿彌陀佛南無當來彌勒佛南無威德佛南無見明佛南無善行報佛南無善喜佛南無無憂佛南無寶明佛南無威儀佛南無樂福德佛南無功德海佛南無盡相佛南無斷魔佛南無盡魔佛南無過衰道佛南無不壞意佛南無水王佛南無淨魔佛南無衆上王佛南無愛明佛南無菩提相佛南無智明佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆相與志誠五體投地奉為四恩三有法界衆生志心回向從今已去至坐道場一切罪障皆得清淨一切煩惱皆得斷除一切功德皆得圓滿隨願往生西方淨土菩提行願皆獨處下昌與切係音計悉成就福慧資糧皆悉具足四無量心六波羅蜜常得現前四無礙智六神通力如意自在住首楞嚴三昧得金剛身不捨本誓還度衆生同生淨土皆成佛道嬈奴了切中悔上去下上諭音喻呰將此切鮮潔上音仙厲力世切盥音灌屏音餅
