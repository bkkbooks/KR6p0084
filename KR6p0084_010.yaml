body:
  text: 自慶第十一今日道場同業大衆前乃總為禮佛已竟與諸衆生俱蒙解脫過去者已得往生見在者當得往生未來者依此修行亦得往生今者宜應自慶衆等踊躍相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無八十四俱胝佛南無西南方現在一切諸佛南無最上日光名稱功德佛如是等佛如殑伽沙住在西南方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆若知自慶者則復應須修出世心何者自慶佛言地獄難免我等相與已得免離此苦是一自慶餓鬼難脫我等相與已得遠離痛切是二自慶畜生難捨相與已得不受其報是三自慶生在邊地不知仁義相與已得共住中國道法流行親承妙旨是四自慶生長壽天不知植福相與已得更復樹因是五自慶人身難得一失不返相與已得各獲人身是六自慶六根不具不預善根相與清淨得深法門是七自慶世智辨聰返成為難相與一心歸憑正法是八自慶佛言見佛為難相與已得瞻對尊像是九自慶佛言聞法復難相與已得餐服甘露是十自慶佛言出家為難相與已得辭親割愛歸向入道是十一自慶佛言自利者易利他為難相與今日一拜一禮普為十方是十二自慶佛言捍勞忍苦為難相與今日各自翹勤有所為作不為自身是十三自慶佛言讀誦為難我等大衆同得讀誦是十四自慶坐禪為難而今見有息心定意者是十五自慶相與志心踊躍歡喜五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無善寂佛南無梵命佛南無知喜佛南無神相佛南無如衆王佛南無持地佛南無愛日佛南無羅睺月佛南無華明佛南無藥師佛南無持勢力佛南無福德明佛南無喜明佛南無好音佛南無法自在佛南無梵音佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆如上所說一十五種是在世間求生淨土修因之慶次復應知一十五種是出世間往生淨土之慶人各志誠攝心諦聽佛言此教難遇難信難知今遇此教易信易知是十六自慶佛言前生不遇此教所以不出三界六道生死輪回是十七自慶佛言衆生濁惡障重福薄雖有此教迷而不知知而不行今遇此教能知能行是十八自慶佛言不知此教多修雜善無決定心不出輪回今遇此教專修一行決出輪回是十九自慶佛言無善根人臨命終時多見惡境或值惡緣不聞經法罪業牽纏哀號恐怖入於地獄求救無門今蒙此教臨命終時值遇善緣及逢善友教修此法廣為演說西方淨土善相勝法一一指陳其心歡喜發願往生或聞善友教稱十念或自念十聲南無阿彌陀佛連連稱念具足十聲惡境便滅善境現前其人自見阿彌陀佛觀音勢至清淨海衆親來迎接身坐蓮臺或乘蓮華身隨佛後往生淨土是二十自慶生淨土已九品四色七寶蓮池自然化生成清淨身離胎胞質是二十一自慶生淨土已身真金色具三十二相形貌端嚴無諸醜陋是二十二自慶生淨土已具六神通飛空自在遊歷十方作大佛事是二十三自慶生淨土已壽命無量與佛齊等更無中夭是二十四自慶生淨土已衣食隨念宮殿逐身自然快樂七寶莊嚴一切具足無求不得是二十五自慶生淨土已具無礙辨才得八萬四千陀羅尼門智慧明了無不通達是二十六自慶生淨土已與大菩薩觀音勢至為其勝友無怨憎會是二十七自慶生淨土已六時聞法悟無生忍是二十八自慶生淨土已更無退轉直至成佛是二十九自慶忍力成就乘大願船却來三界遍歷十方生死海中復度衆生往生淨土同成阿耨多羅三藐三菩提是三十自慶相與志心踊躍歡喜五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無善業佛南無意無謬佛南無大施佛南無名讚佛南無衆相佛南無德流布佛南無世自在佛南無德樹佛南無滅癡佛南無無量佛南無善月佛南無無邊辨相佛南無梨陀法佛南無應供養佛南無度憂佛南無樂安佛南無世意佛南無愛身佛南無妙足佛南無優鉢羅佛南無華纓佛南無無邊辨光佛南無信聖佛南無德精進佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆如是自慶因緣無量非復弱辭所能宣盡凡人處世苦多樂少況今相與有此大慶皆是十方三寶威力阿彌陀佛大願之力宜各志心懷思恩德歡喜踊躍奉為國王父母師長上中下座信施檀越善惡知識天龍八部太山府君五道大神一切鬼神琰魔王界十八獄王并諸眷屬廣及十方三界六道無窮無盡含情抱識有佛性者五體投地志誠歸依十方三世盡虗空界一切三寶西方阿彌陀佛願以慈悲心同加攝受以不思議力覆護極接令三界六道一切衆生從今已去越生死海往極樂國行願早圓俱登十地入金剛心成等正覺普皆回向第十二今日道場同業大衆前以自慶已竟次乃普皆回向所修西方懺法回向法界衆生同成無上菩提共證真如實際相與志心五體投地歸依世間父慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無九十九俱胝佛南無西北方現在一切諸佛南無無量功德火王光明佛如是等佛如殑伽沙住在西北方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆普為十方盡法界一切衆生以此修集禮念彌陀懺法一切善根功德勝因惟願西方淨土阿彌陀佛慈悲證明普皆回向宜各人人等一志心稽首歸依大導師十方三世諸如來今集彌陀禮懺法救度生死愛河人八萬行中詮要行顯示西方淨土門自勸勸他生彼國願佛慈悲力加護稽首歸依無量壽彼國他方大悲主聞名渴仰遙頂禮願共自他親奉侍廣引諸經讚淨土教令念佛往西方今日大衆如上所說普為法界衆生修集彌陀懺法功德普皆回向已相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無真實佛南無天主佛南無高音佛南無信淨佛南無婆耆羅陀佛南無福德音佛南無炎熾佛南無無邊德佛南無聚成佛南無師子遊佛南無不動佛南無信清淨佛南無行明佛南無龍音佛南無持輪佛南無財成佛南無世愛佛南無法名佛南無無量寶名佛南無雲相佛南無慧道佛南無妙香佛南無虗空音佛南無虗空佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆如普賢行願所發回向偈曰我今回向諸善根為得普賢殊勝行願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界我此普賢殊勝行無邊勝福皆回向普願沉溺諸衆生速往無量光佛剎今日大衆如上普賢所說回向已相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無天王佛南無珠淨佛南無善財佛南無燈炎佛南無寶音佛南無人主王佛南無羅睺守佛南無安隱佛南無師子意佛南無寶名聞佛南無得利佛南無遍見佛南無世華佛南無高頂佛南無無偏辨才佛南無差別知見佛南無師子牙佛南無梨陀步佛南無福德佛南無法燈蓋佛南無目揵連佛南無無憂國佛南無意思佛南無樂菩提佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆願弟子等承是修集懺法回向所生功德仰願當今皇帝皇家眷屬從今已去至坐道場護持佛法如薩陀波倫大悲滅罪如虗空藏能遠聽法如琉璃光善解難法如無垢藏又願某甲等所生父母歷劫親緣從今已去至坐道場散形空界如無邊身具十功德如高貴德王聞法歡喜猶如無畏神通勇猛如大勢至又願某甲等和尚阿闍梨同學眷屬上中下座一切知識從今已去至於道場各得無畏如師子王影嚮大化猶如寶積聞聲救苦如觀世音善能咨問如大迦葉又願某甲等出家在家信施檀越善惡知識各及眷屬從今已去至于道場解諸危厄猶如救脫相㒵端嚴猶如文殊能捨業障如棄陰蓋設最後供等於純陀又願諸天諸仙護世四王聰明正直天地虗空主善罰惡守護持呪五方龍王龍神八部幽顯靈祇各及眷屬從今已去至于道場大慈覆護如阿逸多精進護法如不休息遠證讀誦猶如普賢為法焚身猶如藥王又願十方一切怨親及悲怨親四生六道一切衆生各及眷屬從今已去至於道場心無愛染如離意女微妙巧說如勝鬘夫人能行精進如釋迦文所有善願等無量壽所有威神如諸天王不可思議如維摩詰一切功德各各成就無量佛土悉具莊嚴仰願十方盡虗空界無量諸佛諸大菩薩一切賢聖以慈悲心同加攝受救護拯接所願圓滿信心堅固德業日遠慈育四生等如一子令諸衆生得四無量心具六波羅蜜應念見佛皆如勝鬘一切行願畢竟成就等與如來俱登正覺囑纍流通第十三夫囑纍流通者續彌陀之慧命傳佛祖之心燈法藉緣興道由人顯彌陀教內囑纍重宣淨土經中流通廣演今則佛曰已遠末法時臨以懺法囑纍於十方仗佛力流通於萬古更冀龍天密佑賢聖冥加俾進道而無魔令修行而有賴人天同慶水陸咸欣更相歡化於無窮遞玄弘揚於不朽或聞或見盡往西方若受若持咸歸極樂願希劫海傳無盡共助彌陀作指南今日道場同業大衆前以普皆回向已竟次應囑纍流通仰願十方三世一切聖賢梵釋四王金剛天等護法神衆令此懺法盡未來際流通不絶廣度群生多所饒益自行勸他見聞隨喜乃至書寫讀誦受持同得往生西方淨土是故我等五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無東北方現在一切諸佛南無無數百千俱𦙁廣慧佛如是等佛如殑伽沙住東北方自佛淨土及十方佛各各示現廣長舌相遍覆三千大千世界周匝圍繞說誠諦言汝等有情皆應信受如是稱讚不可思議佛土功德一切諸佛攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩南無護持國界梵釋四王天龍八部諸賢聖衆歸依十方盡虗空界一切諸佛一拜歸依十方盡虗空界一切尊法一拜歸依十方盡虗空界一切賢聖一拜願共諸衆生往生安樂國志心歸命禮西方彌陀佛又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆重復志誠囑纍流通仰啓十方盡虗空界一切菩薩護法神王以本願力誓度衆生攝受衆生無窮無盡同善知識無分別想願一切衆生知如來恩親近供養願諸菩薩慈悲哀念令諸衆生不違其教悉能受持無有懈息得無礙乘究竟自在始自歸依三寶終至囑纍流通所有造懺功德悉以回施法界衆生仰願彌陀世尊及十方諸佛現為我證令我所願皆得成就願諸衆生俱生淨土聞法悟道功德智慧悉皆具足與諸菩薩等無有異入金剛心成等正覺相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無法天敬佛南無斷勢力佛南無極勢力佛南無慧華佛南無堅音佛南無安樂佛南無妙義佛南無愛淨佛南無慚愧顏佛南無妙髻佛南無欲樂佛南無樓志佛南無無量無邊盡虗空界無生法身菩薩無漏色身菩薩發心菩薩南無興正法馬鳴菩薩南無興像法龍樹菩薩南無十方盡虗空界無邊身菩薩師子遊戲菩薩師子奮迅菩薩師子幡菩薩師子作菩薩堅勇精進菩薩金剛慧菩薩棄陰蓋菩薩寂根菩薩慧上菩薩常不離世菩薩藥王菩薩藥上菩薩虗空藏菩薩金剛藏菩薩常精進菩薩不休息菩薩妙音菩薩妙德菩薩寶月菩薩月光菩薩薩陀波倫菩薩超三界菩薩大准提菩薩南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆今此念佛禮懺往生法門過去諸菩薩已修已生安樂國未來諸菩薩當修當生安樂國現在諸菩薩今修今生安樂國我等有幸亦修此法相與如是三世菩薩同共集會遊履極樂清淨佛土受用最勝廣大法樂彌陀經鈔云勸一人念佛即是成就一衆生往生一衆生往生即是成就一衆生成佛一衆生成佛已即度無量衆生成佛無量衆生成佛已轉度無窮衆生成佛其未來諸佛出世善因皆由此始是以修集彌陀禮懺法門成就衆生往生淨土成佛捷徑出世要津無量功德蓋非小補今則剖開寶藏指出衣珠分付有緣普同受用頂禮奉辭一切和南三乘聖衆禮念彌陀懺法已竟願以此功德普及於一切我等與衆生當生極樂國同見無量壽皆共成佛道回茲有作之功上助無為之化伏願當今皇帝萬歲天眷文武千秋聖日並佛日常明金輪與法輪雙運風調雨順歲稔時康萬國歡欣四邊寧靜十方抱識同為極樂之化生法界含靈共作彌陀之海衆仰惟大覺俯賜證明謹懺捍音旱前龜山朗公早蛻名韁今善講且誠孝免益敬之乙卯春仲來謂免曰吾以大懺願為兼善蓋末流入佛捷徑止此而已至順間三藏順菴寓燕時板其懺本徒安旻天寺庶廣印行自火於辛丑恨其湮沒幸因師幹事重刊喜而相之子將以一語著于末免曰何敢贅焉公微笑而去比再來方請跋辭未之已乃引徵聊激信佛者昔羅僧發徵居西孔寺令世一開士期萬日修淨土業及期果與二千檀家共西邁所謂萬人同得去明矣夫古今不二而人法亦一也但信之深淺念之勤怠有不同耳苟能於佛深信勤念者根塵潔而法器成故臨終十念佛必來迎其言淨土甚易往信哉公可斯語而後復繼之曰今板既訖功文壽其傳而使覽者有所感焉更相力勸而念之至為家淨土而人彌陀則公之願償矣師之事畢矣免於是乎乃敬書以助大懺之弘闡此亦壽福君國之一道也倉龍丙辰仲春朔日岩遁朴免妥夫書彌陀道場懺法跋成化四年秋九月日大上王奄棄群臣我殿下哀慕罔極印成彌陀懺法轉於殯側臣切聞大雄氏曰西方有無量壽佛國名極樂一念信心即得往生受諸快樂而此懺法伏諸佛之威神懺多生之宿障直指往生徑路實為成佛階除所謂西方淨土一訣往生無上菩提兩手分付者矣我大行王夙植德本洞達真乘其尊崇三寶誕揚玄化十方佛天所共證明豈但一念信心而已哉超生淨界頓證佛果也無疑矣推其極盡十方界莫不均霑利益同成無上正果也然後已焉嗚呼豈易量哉通政大夫禮曹參議臣李克墩謹跋
