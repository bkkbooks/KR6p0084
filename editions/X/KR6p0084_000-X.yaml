body:
  text: 重刊禮念彌陀道場懺法序余觀古今論念佛往生者多誇自力所謂唯心淨土不往而往自性彌陀不成而成之類也竊意斯論似輕佛力也夫佛也者其體明淨無幽不燭或有人雖不知佛之所以為佛但隨人言稱南無佛其人已於如來妙觀察智中成就佛地正因之謂蓮生瑤池矣譬如游魚吞鈎雖不知鈎之所以為鈎其魚已入鈎者之手矣故知佛之一字即覺海之一鈎也大都大天源延聖寺高麗三藏法師旋公久默斯要偶觀金時王子成所撰彌陀懺法其開誘之術與公兼濟之心若合符契乃損己資委其同志比丘祖栢旁募眾緣鳩工入梓以傳諸遠俾余為之序引余曰未曾有也佛有八萬四千相好光明徧照十方世界念佛眾生攝取不捨何如吾三藏公以文字般若攝取眾生其光亘於萬古盛大俾見者聞者同登不退轉地永祝聖人金剛無量壽域可謂能下覺海之一鈎者也旹至順三年七月日大都大覺住持日本國沙門至道序彌陀懺讚奉政大夫翰林修撰同知制誥趙秉文撰極樂居士王慶之集淨土因緣為懺文閑閑居士稽首讚曰未曾有也昔有達官事一道人謹甚親友或勸之曰公聰明特達何至作此闒冗事公謝不敏勸者愈力公曰若等果以余為聰明特達而復事彼是必有質於我者矣彌陀淨土諸經稱讚者不一歷代名士歸依者甚眾可以無疑矣至於太白樂天東坡山谷皆知尊嚮其亦可謂聰明特達者非耶宿植善根者不待余言而了不然如小兒觀戲隨長者笑可也更或未然但觀此懺思過半矣乃敬而為之讚曰眾生見佛秪是一心佛度眾生不離大願心猶鏡然交光涉入願猶地然有種即生汝且觀此諸大幻師陽燧取日方諸承月本無去來緣有彼此當知淨土亦復如是又如二人出門相背一人適燕一人適越乃至終身各不相值苟為相求萬里咫尺佛愛眾生如母憶子子若逃逝雖憶何為子若念母決定見母我觀彌陀作慈母想為佛長子一切菩薩是我眷屬無量法財隨意充足孰有智者甘受貧苦捨極樂土戀閻浮提發心還家須知道路極樂居士是汝導師當知此懺諸資粮具稽首十力為我證明敬告佛子當作此觀彌陀懺序儒林郎應奉翰林文字同知制結兼夔王府文學記室參軍武騎尉賜緋魚袋李純甫撰天地之中凡有血氣皆有鬪心更相噉食其苦無量幸而為人差似樂者僻在蠻夷亦相屠害與苦相應又幸而生於中國其樂頗勝試考於古史兵饑疫癘苦相居多又幸而老於治世誠可樂也其困窮微賤疲羸殘癈之屬猶有不勝其苦者至於大幸富足貴豪康強聰慧之徒其樂為何如哉或嗜欲未滿其志或憂患遽及於身尚且不免悲思驚嘆有自以為苦者佛說眾生世界為苦趣此真實語也故學佛者先修苦行經無數劫求寂滅樂未得少分然則何以疾度此苦厄徑至樂地耶佛大慈悲開方便門云此西方有無量壽佛國名極樂眾生起一念信心持彼佛名號即得往生同無量壽更無老病死者神通智慧與無數劫修行者等無有異故名極樂此又真實語也自佛教東行陰修密證者不可勝數但昧者不知耳近讀極樂居士結集西方淨土懺文法門乃學佛者之捷徑屬予讚嘆故亦以真實語識之崇慶二年中春望日序啟運彌陀道場懺法一心歸命十方三世一切諸佛南無過去毗婆尸佛南無尸棄佛南無毗舍浮佛南無拘留孫佛南無拘那含牟尼佛南無迦葉佛南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒尊佛
