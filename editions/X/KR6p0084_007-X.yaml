body:
  text: 發願往生第八夫發願往生者順釋迦偏讚之言應法藏度生之願臨終之際感聖眾以來迎往生之時蒙彌陀而接引託質七珍池內化生九品蓮中壽量難窮身光無數獲七辯之智具六通之威菩薩為鄰聲聞作伴我等如是眾生亦然俓挺鉄石心同歸金色界唯此願王獨不捨剎那引導入蓮池今日道場同業大眾相與發起大菩提心竟我等應知從今已去生如來家為法王子預清淨眾繼往生人是故復應修學菩提行願如阿彌陀佛最初因中為法藏比丘所發四十八願又如普賢文殊廣大行願亦如十方三世諸大菩薩所有行願我亦如是次第修學惟願我等同生淨土五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無六十六俱胝佛南無上方現在一切諸佛南無梵音佛南無宿王佛南無香光佛南無如紅蓮華勝德佛南無示現一切義利佛如是等佛如殑伽沙住在上方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大眾志心發願願某甲等普及四恩三有法界眾生從今已去安住第一義諦修佛淨業正因孝養父母奉侍師長慈心不殺修十善業受持三歸具足眾戒不犯威儀發菩提心深信因果讀誦大乘勸進行者念佛念法念僧念戒念施念天以志誠心深心迴向發願心稱佛名號讚佛光明觀佛依正十六妙境念佛本起四十八願籌量三輩深入五門隨順三種菩提門信受十方諸佛教或以散心定心修散善定善依經起行畢命為期惟願阿彌陀佛聖力冥加神通顯益令我等凝神覺路暗蹈大方進止威儀不離見佛如執明鏡自見面像及於夢中常見彼國眾妙樂事慰悅我心令生增進哀愍覆護法種增長承佛威神遠離魔事又復無量劫來業惑塵勞皆為梵行善根功德同入大因積集諸緣併用迴向臨命終時無諸障難七日已前預知時至身無痛苦心不顛倒身心安樂如入禪定遇善知識教稱十念阿彌陀佛與諸聖眾現在其前放大光明授手迎接自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身眾相具足見諸菩薩眾相具足光明寶林演說妙法聞已即悟無生法忍身真金色等無差別三十二相六通自在具大辯才演一切智那羅延身壽命無量供養如意妙服自然不聞惡名不著身見諸上善人俱會一處住正定聚恒不退還究竟至於一生補處受用清淨大乘法樂晝夜六時供養阿彌陀佛每日清旦奉事十方如來聞法授記得陀羅尼化身自在周遍十方無佛國中成等正覺極重苦處遊戲神通隨眾生心應所知量對現色身晝夜說法無有休息念念中令不可說不可說眾生發菩提心念念中令不可說不可說眾生住普賢行福慧資粮悉得圓滿同成無上正等菩提各各莊嚴淨土各各攝化眾生如阿彌陀佛等無有異惟願阿彌陀佛慈悲證明今日道場同業大眾願諸眾生悉具菩薩清淨佛土歡化慳嫉悉度眾惡八難之處攝諸諍訟瞋恚之人勤行眾善攝懈怠者定意神通攝諸亂想已發願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無寶名佛南無眾清淨佛南無無邊名佛南無不虗光佛南無聖天佛南無智王佛南無金剛眾佛南無善障佛南無建慈佛南無華國佛南無法意佛南無風行佛南無善思名佛南無多明佛南無蜜眾佛南無功德守佛南無利意佛南無無懼佛南無堅觀佛南無住法佛南無珠足佛南無解脫德佛南無妙身佛南無善高佛南無普德佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大眾各自發如是願尋眾惡所起皆緣六根六根是為眾禍之本雖為禍本亦能修集無量福業故勝鬘經言守護六根淨身口意以此義證生善之本故於六根發大誓願初發眼根願願今日道場同業大眾廣及十方四生六道一切眾生從今已去乃至往生願眼常不見娑婆世界一切眾惡不善之色願眼常見西方阿彌陀佛閻浮檀金色八萬四千隨形相好光明觀音勢至紫金色身清淨海眾端正微妙三十二相極樂國土無量莊嚴清淨之色常見一切眾生往生淨土得無生忍現前授記歡喜之色已發眼根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無妙知佛南無梵財佛南無實音佛南無正智佛南無力得佛南無師子意佛南無華相佛南無積智佛南無華齒佛南無功德藏佛南無名寶佛南無希有名佛南無上戒佛南無無畏佛南無一切天佛南無梵壽佛南無日明佛南無樂智佛南無寶天佛南無珠藏佛南無德流布佛南無智王佛南無無縛佛南無堅法佛南無天德佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜次發耳根願又願今日道場同業大眾廣及十方四生六道一切眾生從今日去乃至往生願耳不聞娑婆世界諸惡不善之聲願耳常聞西方阿彌陀佛於七寶講堂廣宣妙法自然風起吹諸寶樹及寶羅網微妙音聲如百千種樂種種奇禽演暢五根五力七覺分八聖道之聲常聞一切眾生往生淨土彌陀讚言善哉善哉是人不久成佛之聲已發耳根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無梵牟尼佛南無安詳行佛南無勤精進佛南無炎肩佛南無大威德佛南無薝蔔華佛南無歡喜佛南無善眾佛南無帝幢佛南無大愛佛南無須蔓色佛南無眾妙佛南無可樂佛南無善定義佛南無牛王佛南無妙臂佛南無大車佛南無滿願佛南無德光佛南無寶音佛南無金剛軍佛南無富貴佛南無勢力行佛南無師子力佛南無淨目佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復婦依如是十方盡虗空界一切三寶無量賢聖一拜次發鼻根願又願今日道場同業大眾廣及十方四生六道一切眾生從今已去乃至往生願鼻不聞娑婆世界諸惡不善之氣願鼻常聞極樂國土於晨朝時和風微動鉢曇摩華𤘽物頭華及天雨曼陀羅華其氣普熏周遍國界之香已發鼻根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無迦葉佛南無淨意佛南無知次第佛南無威猛德佛南無大光明佛南無日光曜佛南無淨藏佛南無分別威佛南無無損佛南無蜜日佛南無月光佛南無持明佛南無善寂行佛南無不動佛南無大請佛南無德法佛南無莊嚴王佛南無高出佛南無炎熾佛南無華德佛南無寶嚴佛南無上善佛南無寶上佛南無利慧佛南無嚴土佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜次發舌根願又願今日道場同業大眾廣及十方四生六道一切眾生從今已去乃至往生願舌恒不甞娑婆世界諸惡不善之味願舌恒甞極樂世界寶器隨意而至百味飲食自然盈滿雖有此食實無食者自然飽足無所味著之味已發舌根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無海德佛南無梵相佛南無月蓋佛南無多炎佛南無違籃王佛南無智稱佛南無覺想佛南無功德光佛南無聲流布佛南南滿月佛南無華光佛南無善戒佛南無燈王佛南無電光佛南無光王佛南無光明佛南無是足讚佛南無華藏佛南無弗沙佛南無日端嚴佛南無淨善佛南無威猛軍佛南無福威德佛南無力行佛南無羅睺天佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜次發身根願又願今日道場同業大眾廣及十方四生六道一切眾生從今已去乃至往生願身不覺娑婆世界諸惡不善一切諸觸願身常覺極樂世界宮殿樓閣微風觸身安和調適猶如比丘得滅盡定清淨寶地八功德水清明澄潔洗灌其身蕩除四垢之觸常覺一切眾生往生淨土不寒不熱不飢不渴飛行自在與諸菩薩聽法之觸已發身根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無智聚佛南無調御佛南無如王佛南無華相佛南無羅睺羅佛南無大藥佛南無宿王佛南無華王佛南無德手佛南無得叉迦佛南無流布王佛南無日光佛南無德藏佛南無妙音佛南無德主佛南無金剛眾佛南無慧頂佛南無善住佛南無意行佛南無梵音佛南無師子佛南無雷音佛南無通相佛南無安隱佛南無慧陰佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜次發意根願又願今日道場同業大眾廣及十方四生六道一切眾生從今已去乃至往生願意常知娑婆世界貪欲瞋恚愚癡為患常知身殺盜染妄言綺語兩舌惡口為患常知殺父害母殺阿羅漢出佛身血破和合眾謗佛法僧不信因果是無間罪常知人死更生報應之法常知遠惡知識親近善友常知諮受九十六種邪師為非常知三漏五蓋十纏之法是障常知三塗可畏生死酷劇苦報之處願己常知極樂國土清淨海眾無我所心無染著心無忿恨心無厭怠心勝心深心定心愛樂法心滅諸煩惱離惡趣心常知一切菩薩所行具足成就無量功德得深禪定究竟一乘之心已發意根願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無梵王佛南無大牛王佛南無利陀目佛南無龍德佛南無寶相佛南無莊嚴佛南無不沒音佛南無華持佛南無音德佛南無師子佛南無莊嚴辭佛南無勇智佛南無華積佛南無華開佛南無力行佛南無德積佛南無上形色佛南無明曜佛南無月燈佛南無威德王佛南無菩提王佛南無無盡佛南無菩提眼佛南無身充滿佛南無慧國佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜次發口願又願今日道場同業大眾廣及十方四生六道一切眾生從今已去娑婆世界乃至往生口常不毀呰三寶不謗弘通經人說其過惡不言作善不得樂報作惡不得苦果不言人死斷滅不復更生不說無益損他人事不說外道所造經書不教人作十惡業不教人作五逆業不稱揚人惡不言俗間好戲笑事常發善言不勸人造罪不斷人造福願口常念阿彌陀佛觀音勢至清淨大海眾菩薩願常教人建立彌陀佛像修諸供養求生淨土如救頭然願口常教一切眾生往生淨土以無礙智演說佛法具諸辯才已發口願竟相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無最上佛南無清涼照佛南無慧德佛南無妙音佛南無導師佛南無無礙藏佛南無上施佛南無大尊佛南無知力勢佛南無大炎佛南無帝王佛南無制力佛南無威德佛南無善明佛南無名聞佛南無端嚴佛南無無塵垢佛南無威儀佛南無師子軍佛南無天王佛南無名聲佛南無殊勝佛南無大藏佛南無福德光佛南無梵聞佛南無文殊師利菩薩南無普賢菩薩南無觀世