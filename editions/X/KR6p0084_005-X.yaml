body:
  text: 極樂莊嚴第五今日道場同乘大眾前已廣明往生傳錄次應隨喜極樂莊嚴勝妙境界宜應發起欣樂趣向之心求願往生且初生淨土已得超昇始見彌陀永無退轉速悟無生法忍頓捐有漏凡情喜樂難思壽命無量諸佛世界有無邊極樂莊嚴為第一相與志心等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無四十四俱胝佛南無北方現在一切諸佛南無無量光嚴通達覺慧佛南無無量天鼓震大妙音佛南無大蘊佛南無光綱佛南無娑羅帝王佛如是等佛如殑伽沙住在北方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大眾志心諦聽西方淨土微妙莊嚴如經所說次第開陳法藏誓願修因莊嚴無量壽經云佛告阿難乃徃過去無央數劫有佛名世自在王如來十號具足時有國王聞佛說法發無上道意棄國捐王行作沙門號曰法藏才高智勇與世超絕白佛言我發無上道意願說法我等修行令我於世速成正覺諸生死勤苦之本時世自在王佛為說二百一十億諸佛剎土天人善惡國土麤妙法藏比丘聞已修行五劫於世自在王如來前超發四十八殊勝大願四十八願願力莊嚴惡趣無名願一者若我成佛國土有地獄餓鬼畜生名者我終不取正覺無墮惡道願二者若我成佛國中眾生有墮三惡道者我終不取正覺同真金色願三者若我成佛國中有情若不皆同真金色者我終不取正覺形貌無差願四者若我成佛國土有情形㒵差別有好醜者不取正覺成就宿命願五者若我成佛國土有情不得宿命不知億那由他百千劫事者不取正覺生獲天眼願六者若我成佛國土有情若無天限不見億那由他百千諸佛國者不取正覺生獲天耳願七者若我成佛國中有情不獲天耳不聞億那由他百千諸佛說法者不取正覺普知心行願八者若我成佛國土有情無他心智不知億那由他百千佛國有情心行者不取正覺神足超越願九者若我成佛國土有情不獲神通於一念頃不能超過億佛剎土者不取正覺淨無我想願十者若我成佛國中有情起少分我我所想者不取正覺決定正覺願十一者若我成佛國土有情若不決定成等正覺者不取正覺光明普照願十二者若我成佛國土有情光明有限不照邪由他百千億佛剎者不取正覺壽量無窮願十三者若我成佛國土有情不壽量無限乃至筭數劫者不取正覺聲聞無數願十四者若我成佛國中聲聞無有能知其數若有知者不取正覺眾生長壽願十五者若我成佛國土有情不壽量無限齊者不取正覺除願力受生皆獲善名願十六者若我成佛國土有情有不善名者不取正覺諸佛稱讚願十七者若我成佛彼無量剎中無數諸佛不共稱讚我國者不取正覺十念往生願十八者若我成佛餘剎有情聞我名已願生我國乃至十念若不生者不取正覺除五無間誹謗正法及毀聖人臨終現前願十九者若我成佛餘剎有情發菩提心願生極樂臨終我當現其人前若不爾者不取正覺迴向皆生願二十者若我成佛餘剎有情聞說我名善根迴向願生我國若不爾者不取正覺具足妙相願二十一者若我成佛國中菩薩皆不具三十二相者不取正覺咸階補處願二十二者若我成佛國中菩薩咸悉位階一生補處行普賢道若不爾者不取正覺晨供他方願二十三者若我成佛國中菩薩晨朝供養他方無數諸佛食前還至本國若不爾者不取正覺所須滿足願二十四者若我成佛國中菩薩所須種種供具於諸佛所植諸善根不圓滿者不取正覺善入本智願二十五者若我成佛國中菩薩不善順入一切智者不取正覺那羅延力願二十六者若我成佛國中菩薩若無那羅延堅固力者不取正覺莊嚴無量願二十七者若我成佛國中諸莊嚴具若有能知及總宣說者不取正覺寶樹悉知願二十八者若我成佛國中無量眾色寶樹諸菩薩眾不了知者不取正覺獲勝辯才願二十九者若我成佛國土眾生不獲得勝辯才者不取正覺大辯無邊願三十者若我成佛國中菩薩若不成就無邊辯才者不取正覺國淨普照願三十一者若我成佛國土光淨普照佛剎如明鏡中現其面像若不爾者不取正覺無量勝音願三十二者若我成佛國界之內有無量音殊勝超世若不爾者不取正覺蒙光安樂願三十三者若我成佛十方眾生蒙我光所照燭者身心安樂若不爾者不取正覺成就總持願三十四者若我成佛十方菩薩聞我名者若不得陀羅尼者不取正覺永離女身願三十五者若我成佛諸佛土中若有女人聞我名已得清淨信發菩提心來生不拾女人身者不取正覺聞名至果願三十六者若我成佛諸佛土中菩薩聞我名已若不修行至菩提者不取正覺天人敬禮願三十七者若我成佛十方菩薩聞我名已發清淨心一切天人不敬禮者不取正覺須衣隨念願三十八者若我成佛國中眾生所須衣服應念即至若不爾者不取正覺纔生心淨願三十九者若我成佛諸眾生類纔生我國若不皆獲心淨安樂如羅漢者不取正覺樹現佛剎願四十者若我成佛國中群生欲見諸佛淨國於寶樹間悉皆出現若不爾者不取正覺無諸根缺願四十一者若我成佛餘剎眾生聞我名已諸根有缺德用非廣者不取正覺現證等持願四十二者若我成佛餘剎菩薩聞我名已若不現證三摩地者不取正覺聞生豪貴願四十三者若我成佛餘剎菩薩聞我名已壽終不生豪貴家者不取正覺具足善根願四十四者若我成佛餘剎菩薩聞我名已若不修行其善根者不取正覺供佛堅固願四十五者若我成佛餘剎菩薩聞我名已供養諸佛乃至菩提有退轉者不取正覺欲聞自聞願四十六者若我成佛國中菩薩所欲聞法自然得聞若不爾者不取正覺菩提無退願四十七者若我成佛餘剎菩薩聞我名已於菩提心有退轉者不取正覺現獲忍地願四十八者若我成佛餘剎菩薩聞我名已不獲忍地於諸佛法現證不退轉者不取正覺佛告阿難徃昔法藏比丘者今西方極樂世界無量壽佛是國土嚴好壽命無量眷屬不可思議一切皆是因中所發大願之所成就今日道場同業大眾如經所說四十八願修因莊嚴相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無善意佛南無離垢佛南無月相佛南無大名佛南無珠髻佛南無威猛佛南無師子步佛南無德樹佛南無觀釋佛南無慧聚佛南無安住佛南無有意佛南無鴦伽陀佛南無無量意佛南無妙色佛南無多智佛南無光明佛南無堅戒佛南無吉祥佛南無寶相佛南無蓮華佛南無那羅延佛南無安樂佛南無智積佛南無德敬佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜彌陀名號壽光莊嚴彌陀經云佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法舍利弗彼土何故名為極樂其國眾生無有眾苦但受諸樂故名極樂舍利弗彼佛何故號阿彌陀彼佛光明無量照十方國無所障礙是故號為阿彌陀彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀阿彌陀佛成佛已來於今十劫彼佛有無量聲聞弟子皆阿羅漢非是筭數之所能出豈知諸菩薩眾亦復如是彼佛國土成就如是功德莊嚴字號三大士觀寶像莊嚴觀經云想彼佛者先當想像閉目開目見一寶像如閻浮檀金色坐彼華上見像坐已心眼得開了了分明見極樂國七寶莊嚴寶地寶池寶樹行列諸天寶幢彌覆其上眾寶羅網滿虗空中見如此事極令明了如觀掌中見此事已復當更作一大蓮華在佛左邊如前蓮華等無有異復作一大蓮華在佛右邊想觀世音菩薩像生左華座亦作金色如前無異想一大勢至菩薩坐右華座此想成時佛菩薩像皆放光明其光金色照諸寶樹一一樹下亦有三蓮華諸蓮華上各一佛二菩薩像遍滿彼國此想成時行者當聞水流光明及諸寶樹鳧鴈鴛鴦皆說法法出定入定恒聞妙法行者所聞出定之時憶持不捨與修多羅合若不合者名為麤想見極樂世界是為像想今日道場同業大眾如上所說彌陀名號寶像莊嚴相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無梵德佛南無寶積佛南無華天佛南無善思議佛南無法自在佛南無名聞意佛南無樂說聚佛南無金剛相佛南無求利益佛南無遊戲神通佛南無離闇佛南無名天佛南無彌樓相佛南無眾明佛南無寶藏佛南無極高行佛南無提沙佛南無珠角佛南無德讚佛南無日月明佛南無星宿佛南無日明佛南無師子相佛南無違藍王佛南無福藏佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜彌陀國土極樂莊嚴今日大眾重復志誠一心諦聽大阿彌陀經云阿彌陀佛作佛以來凡十小劫所居國土名須摩提正在西方去是閻浮提地界千億萬須彌山佛國其國地皆自然七寶一者白銀寶二者黃金寶三者水晶寶四者瑠璃寶五者珊瑚寶六者琥珀寶七者硨磲寶為地曠蕩甚大無極各自焜煌參明極自軟好甚妹無比諸八方上下眾寶中精自然合會化生耳其寶皆第六天上之寶也其國無大小海水江河山林溪谷無有幽冥之處亦無春夏秋冬亦無大寒大熱常和調中適甚快善無比皆有自然萬種之物百味飯食意欲有所得自然在前所不用者即自然化去即皆隨意國中悉諸菩薩羅漢無有婦女女人往生即化成男子皆面目端正淨潔絕好悉同一色無有偏醜惡者也皆才猛黠慧衣自然之衣心中所念道德其欲語言皆豫相知意所念言常說正事所語輙說經道終不說他餘之惡語其語言音如三百鍾聲皆相敬愛無相嫉憎如兄如弟皆心淨潔無所貪慕自知前世所從來生億萬劫時宿命善惡存亡現在却知無極佛言八方上下無央數佛國諸天人民及蜎飛蠕動之類生阿彌陀佛國者皆於七寶水池蓮華中化生便自然長大亦無乳養之者皆食自然之飲食其身體亦非世間人之身體亦非天上人之身體皆積眾善之德悉受自然虗無之身無極之體其殊好無比佛言所居七寶舍宅有在虗空中者有在地者有欲令舍宅最高者舍宅即高中有欲令最大在虗空中皆自然隨意中有殊不能令舍宅隨意者皆是前世求道時不慈心精進耳佛言諸菩薩羅漢悉皆洞視徹聽見知八方上下去來現在之事復知無數天上天下人民及蜎飛蠕動之類心意所念善惡口所欲言皆知當何歲何劫得度脫得人道往生阿彌陀佛國知當作菩薩羅漢皆緣知之佛言八方上下無央數諸天人民蜎飛蠕動之類其生阿彌陀國當作佛者不可復勝數諸作羅漢得泥洹道者亦無央數不可復計阿彌陀佛為諸菩薩羅漢說經時都悉大會講堂上諸菩薩羅漢及諸天人民無央數都不可復計皆飛到佛所為佛作禮却坐聽經其佛廣說道智大經皆悉聞知莫不歡喜踊躍心開解者即四方自然亂風起吹七寶樹作五音聲七寶樹華覆蓋其國皆在虗空中下其華之香遍國中皆散佛及菩薩羅漢上華墮地皆厚四寸小萎即亂風吹萎華自然去如是四反佛言我第二弟子摩訶目乾連於諸佛國菩薩阿羅漢中最為無比飛行進止智慧勇猛洞視徹聽知八方上下去來現在之事百千億萬倍共合為一智慧當令在阿彌陀佛國中羅漢邊其德尚復不及百千億萬倍佛言第一四王天第二忉利天上至二十八天上諸天人皆持天上萬種自然之物百種雜色華香繒綵劫波育氎衣萬種伎樂轉倍好相勝各持來下為阿彌陀佛作禮供佛及菩薩阿羅漢諸天人皆復大作伎樂當是之時快樂不可言諸天更相開避後來者轉復供養如前乃至其作菩薩者皆欲令悉作佛作佛已轉復教授八方上下諸天人民及蜎飛蠕動之類皆復欲令作佛作佛已復教授諸無央數天人氏蜎飛蠕動之類皆令得泥洹道去諸可教授弟子者展轉復相教授轉相度脫至令得四果辟支佛道轉相度脫皆得泥洹之道不可復計劫終無般泥洹時佛言我說阿彌陀佛功德國土快善盡夜一劫尚復未竟我但為汝曹小說之耳今日道場同業大眾如大經說彌陀國土極樂莊嚴相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無見有邊佛南無電明佛南無金山佛南無師子德佛南無勝相佛南無明讚佛南無堅精進佛南無具足讚佛南無離畏佛南無應天佛南無大燈佛南無世明佛南無妙香佛南無持上功德佛南無離暗佛南無寶讚佛南無師子顏佛南無滅過佛南無持甘露佛南無人月佛南無喜見佛南無嚴莊佛南無珠明佛南無山頂佛南無名相佛南無法稱佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜寶河清淨德水莊嚴大寶積經云佛告阿難彼極樂國無諸山海而有諸河八功德水𤀹流恒激出徵妙音譬若諸天四千伎樂安樂世界其聲普聞有諸名華㳂流而下和風微動出種種香居兩岸邊多栴檀樹脩條密葉交覆於河結實開華芳暉可玩樂群生遊隨意徃來或有涉河濯流嬉戲感諸天水善順物宣深淺寒溫曲從人好阿難大河之下地布金沙有諸天香世無能喻隨風散馥雜水流芬彼國人眾或時遊覽同華河濱激流之響雖獲天耳終竟不聞或有願聞即隨領悟百千萬種佛法僧聲所有眾生或已生或現生或當生皆得諸妙色身形貌端正神通自在福力具足受用種種宮殿園林衣服飲食香華瓔珞隨意所須悉皆如意如是飲食即同食已色力增長而無便穢寶殿如意樓閣莊嚴又經云若諸有情所須宮殿樓閣隨所樂欲高下長短廣狹方圓及諸牀座妙衣敷上以種種寶而莊飾之於諸眾生前自然出現人皆自謂各處其宮晝夜長遠時分莊嚴校量佛剎功德經云不可思議光王菩薩白眾言汝諸佛子今當諦聽此娑婆世界滿一大劫校量時分是彼西方極樂世界無量壽佛剎一晝夜今日道場同業大眾如經所說寶河清淨晝夜長遠無量莊嚴相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無定義佛南無施願佛南無寶眾佛南無眾王佛南無遊步佛南無安隱佛南無法差別佛南無上尊佛南無極高德佛南無上師子音佛南無樂戲佛南無龍明佛南無華山佛南無龍喜佛南無香自在佛南無大名佛南無天力佛南無德鬚佛南無龍手佛南無善行意佛南無因莊嚴佛南無智勝佛南無量月佛南無寶語佛南無日明佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜二十四樂淨土莊嚴安國鈔云所言極樂者有二十四樂一欄楯遮防樂二寶網羅空樂三樹陰通衢樂四七寶浴池樂五八水澄漪樂六下見金沙樂七階際光明樂八樓臺陵空樂九四蓮華香樂十黃金為地樂十一八音常奏樂十二晝夜兩華樂十三清晨策勵樂十四嚴持妙華樂十五供養他方樂十六經行本國樂十七眾禽和鳴樂十八六時聞法樂十九存念三寶樂二十無三惡道樂二十一有佛變化樂二十二樹搖羅網樂二十三千國同聲樂二十四聲聞發心樂三十種益功德莊嚴群疑論云西方淨土有三十種益一受用清淨佛土益二得大法樂益三親近佛壽益四遊歷十方供佛益五遊諸佛所聞法授記益六福慧資粮疾得圓滿益七速證無上正等菩提益八諸天人等同集一會益九常無退轉益十無量行願念念增進益十一鸚鵡舍利宣揚法音益十二清風動樹如眾樂益十三摩尼水漩宣說苦空益十四諸樂音聲奏眾妙音益十五四十八願永絕三塗益十六真金色身益十七形無醜陋益十八具足五通益十九常住定聚益二十無諸不善益二十一壽命長遠益二十二衣食自然益二十三唯受眾樂益二十四三十二相益二十五無實女人益二十六無有小乘益二十七離於八難益二十八得三法忍益二十九身有常光益三十得那羅延身益如上略述法利無邊聖境非虗真談匪謬今日道場同乘大眾如上所說一切莊嚴相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無定意佛南無無量形佛南無照明佛南無寶相佛南無斷疑佛南無善明佛南無不虗步佛南無覺悟佛南無華相佛南無山主王佛南無大威德佛南無遍見佛南無無量名佛南無寶天佛南無住義佛南無滿意佛南無上讚佛南無無憂佛南無無垢佛南無梵天佛南無華明佛南無身差別佛南無法明佛南無盡見佛南無德淨佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海眾菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大眾如經所說極樂莊嚴不可思議勝妙境界十方淨土諸天王宮無能比者是故我等與一切眾生願往彼國同得受用一切莊嚴無盡快樂永得清淨長辭四趣面奉彌陀親承授記六度四等無不備行具四辯才得佛十力相好嚴身神通無礙入金剛心成等正覺鳧音扶焜音魂煜音皇黠胡八切衣自上去繒疾陵切氎音疊濬音峻㳂音緣萃音悴音衣
