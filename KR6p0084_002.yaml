body:
  text: 決疑生信第二嗟夫衆生疑多學寡障重福輕如無開導之文豈解求生之法今則假施問答權設主賓為決疑情令生諦信耳今日道場同業大衆前歸依西方三寶已竟次乃決疑生信普為衆生無始至今種種疑惑各各在心所以不肯求生淨土縱欲求生不知法門多修雜善人天有漏華報因果不出輪回受其生死苦惱無量為此四衆今於諸聖教中採托衆生種種疑惑一一釋之稱讚疏云因則唯修一日七日果則永得阿跋致如是境界駭人耳目若佛在日或正法中衆生福勝信智深厚聞佛一説諦信無疑奈以像末法中有情福劣信智淺薄聞如是法便生疑謗故釋迦世尊説此經時即有十方十殑伽沙諸佛如來現大神變發誠諦言證我世尊所説非謬仍自今有無信之人聞修西方淨土業者撥之為邪謗法之𠎝云何不怖凡是三寶弟子應須諦信佛語如為臣者必信王言若為子者必信父訓若其不信豈得名為忠臣孝子若四衆等以佛為師不信佛語便非佛子乃是魔民如是之人深可怖畏而諸衆生所以不能深信經語有此疑者皆由無明惑故妄起顛倒因疑惑故墮三惡道悔何所及大衆當依佛語如教修行不得疑惑所有我等無始至今一切疑惑重罪業障若不懺除無由往生宜各人人如救頭然求哀禮懺速令清淨未作之罪不敢更作相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無十殑伽河沙數俱胝佛南無東方現在一切諸佛南無不動佛南無山幢佛南無大山佛南無山光佛南無妙幢佛如是等佛如殑伽河沙住在東方自佛淨土各各示現廣長舌相遍覆三千大千世界周匝圍繞説誠諦言汝等有情皆應信受如是稱讚不可思議佛土功德一切諸佛攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆宜加用心攝耳諦聽疑障消除身心解脫願離三塗求生九品過去生死劫石難量未來輪回芥城何盡惟願三心勵志十念成功此方生緣既謝彼界妙境即現祥雲後捧淨侶前迎剎那頃即得往生僧祇劫常居安養今則決疑生信次第開陳問曰稱讚疏云如何口念心思即得往生西方淨土答曰心則緣佛境界憶持不忘口則稱佛名號分明不亂如是心口內外相應若念一句阿彌陀佛能滅八十億劫生死之罪成就八十億劫殊勝功德一句尚爾何況十句百句千句萬句如是一日一月一年一生行住坐臥晝夜精勤何罪垢而不消亡何功德而不增長何因不生極樂國何緣不見彌陀佛譬如嬰兒或有所怖發聲號呼喚其父母父母慈悲聞子喚聲諸事且置急來救護今時五濁惡世衆生常被生老病死三塗等苦之所逼切既覺知已即生驚怖以真實心高聲稱念彼佛名號以求救護阿彌陀佛有天耳通必定遠見有他心通必定遠知佛之慈悲不同人間癡愛父母等視衆生猶如一子決定親來垂慈接引所以然者良以西方無量壽佛願力深重常以光明名號攝化衆生我等佛子今既與佛本願相應理必如是勿生疑慮若諸衆生以志誠心一念十念一日七日承佛願力皆得往生今日道場同業大衆當起勇猛心殷重心志誠心決定心不退轉心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無栴檀功德佛南無無量菊光佛南無光德佛南無無憂德佛南無那羅延佛南無功德華佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜問曰決疑集云但見性悟道便超生死何須繫念彼佛求生他方耶答曰通昧他心聖凡安測知非正遍授記應難真修行人當自審察如人飲水冷暖自知諸仁者當觀自己行解見性悟道受如來記紹祖師位能如馬鳴龍樹不得無礙辨才證法華三昧能如天台智者不宗説皆通行解兼備能如忠國師壽禪師不此諸大士皆明垂言教深勸往生蓋是自利利他豈肯誤人自誤況大雄讚歎金口叮嚀希從昔賢仰稟佛勑定不謬誤又當自忖量臨命終時生死去住定得自在不自無始來惡業重障定不現前不此一報身定脫輪回不天上人間十方世界隨意寄託定無滯礙不若也了了自信得及何善如之若其未然莫以一時貢高却致永劫沈墜自失善利將復尤誰嗚呼哀哉何嗟及矣古德云有為雖偽棄之則功行不成無為雖真趣之則聖果難尅剎那悟道要須長劫煉磨頓悟一心必假圓修萬行誠哉是言也今則末世悠悠之徒學寡疑多妄肆臆説自誤誤人所謂可憐愍者今日道場同業大衆相與志心五體投地歸命世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無蓮華光遊戲神通佛南無財功德佛南無德念佛南無善名功德佛南無紅焰幢王佛南無遊步功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛南無鬪戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜問曰十方皆淨土云何獨指西答曰願強教主勝諸經共讚推十疑論第四云問曰等是念佛求生一佛淨土何不十方佛土中隨念一佛何須偏念西方阿彌陀佛答曰凡夫無智不敢自專之用佛語故偏念阿彌陀佛云何用佛語釋迦大師一代聖教處處唯勸衆生專心偏念阿彌陀佛求生西方極樂世界如無量壽觀經等七十六種因緣殷勤指授求生西方極樂世界其餘諸佛一切淨土雖一經兩經略勸往生未若彌陀佛國處處經論勸令往生是故偏念也如隨願往生經云普廣菩薩問佛十方悉有淨土世尊何故偏讚西方彌陀淨土專遣往生佛告普廣閻浮衆生心多濁亂為此偏讚西方一佛淨土使諸衆生專心一境易得往生若總念一切佛者念佛境寬則心散漫三昧難成故不得往生又求一佛功德與一切佛功德無異以同一佛法性故為此念阿彌陀佛即念一切佛生一淨土即生一切淨土故華嚴經云一切諸佛身即是一佛身一心一智慧力無畏亦然又云譬如淨滿月普應一切水影像雖無量本月未曾二如是無礙智成就等正覺應現一切剎佛身無有二問曰自疑宿業重十念功德微答曰千年萬株木一火變成灰十疑論第八問曰衆生無始以來造無量業今生一形不逢善知識又復作一切罪無惡不造云何臨終十念成就即得往生出過三界結業之事云何可通答曰衆生無始以來善惡業種多少強弱並不得知但能臨終遇善知識十念成就者皆是宿善業強始得遇善知識十念成就若惡業多者善知識尚不能逢何可論十念成就又汝以無始以來惡業為重十念為輕者今以道理三種校量輕重不定不在時節久近多少云何為三一者在心二者在緣三者在決定在心者造罪之時從自虗妄顛倒生念佛者從善知識聞説阿彌陀佛真實功德名號生一虗一實豈得相比譬如萬年暗室日光暫至而暗頓滅豈以久來之暗不能滅耶在緣者造罪之時從虛妄癡暗心緣虗妄境界顛倒生念佛之心從聞佛清淨真實功德名號緣無上菩提心生一真一偽豈得相比譬如有人被毒箭中箭深毒磣傷肌破骨一聞滅除藥鼓即箭出毒除豈以箭深毒磣而不肯出也在決定者造罪之時以有間心有後心也念佛之時以無間心無後心遂即捨命善心猛利是以即生譬如十圍之索千夫不制童子揮劒須臾兩分又如千年積柴一豆火焚少時即盡又如有人一生已來修十善業應得生天臨終之時起一念邪見即墮阿鼻地獄惡業虗妄以猛利故尚能排一生之善業令墮惡道豈況臨終猛心念佛真實無間善業不能排無始惡業得生淨土無有是處又云一念念佛滅八十億劫生死之罪為念佛時心猛利故伏滅惡業決定得生不須疑也上古相傳判十念成就作別時意者此定不可又那先經云國王問那先沙門言人在世間作惡至百歲臨終時念佛死後得生佛國我不信是語那先答曰如持百枚大石置於船上因船故不沒人雖有本惡一時念佛不入泥犁中其小石沒者不置船上如人作惡不知念佛便入泥犁中又何疑也問曰具縛凡夫輩焉能生彼池答曰自力經多劫佛威頃刻時十疑論第五問曰具縛凡夫惡業厚重一切煩惱一毫未斷西方淨土出過三界具縛凡夫云何得生答曰有二種緣一者自力二者他力故十住婆沙論云於此世界修道有二種一者難行道二者易行道難行道者在於五濁惡世於無量佛時求阿鞞跋致甚難可得此難無數塵沙説不可盡略述其五一者外道相似善亂菩薩法二者無賴惡人破他勝德三者顛倒善果能壞梵行四者聲聞自利障於大慈五者唯有自力無他力持譬如跛人步行一日不過數里極大辛苦謂自力也易行道者謂信佛語教修念佛三昧願生淨土乘阿彌陀願力攝持決定得生如人水路行藉船力故須臾即至千萬里謂他力也若言具縛凡夫不得生者同跛人義也論又云劣夫從輪王一日周行四天下非是自力輪王力也今則舉自心之信足登釋迦之教船展方便之輕帆安精進之正從衆聖引迎之路乘彌陀願力之風泛念佛三昧之法流到極樂淨方之彼岸矣問曰天宮樂不少何須堅勸西答曰五衰并十劣不是久長時慈恩通讚云問曰慈氏天宮快樂不少勝侶頗多何須堅勸往生西方答曰若論兜率即勝人間乃並西方全成微劣勝劣既異彼此各殊勸生西方捨劣求勝也勝劣有異者淨土十勝天宮十劣淨土十勝者一化主所居勝二所化命長勝三國非界繫勝四淨方無欲勝五女子不居勝六修行不退勝七淨方非穢勝八國土莊嚴勝九念佛攝情勝十十念往生勝天宮十劣者一所居國土劣二所化壽促劣三界繫攝屬劣四彼天有欲劣五男女雜居劣六修行有退劣七穢方非淨劣八國土莊嚴劣九善念攝情劣十修行勞苦劣又雖壽四千歲己命欲終時有五衰相現一則頭上華萎二則腋下汗出三則起坐不定四則氣力衰微諸天勉其眷屬五則多諸掉舉有斯十劣五衰所以勸生彼國又問曰諸天妙樂壽劫長遠足得修行人中積善亦自超越乃至於修羅龍鬼三塗惡趣正可苦利生何必專務求生極樂耶答曰欲界諸天耽著妙樂醉於放酒視東忘西貪迷放逸者多發心修善者少福盡即墮如箭射空色界諸天雖獨行無交而未盡形纍無色界天亦不出輪回經中判為難地傅大士云饒經八萬劫終是落空亡又楞嚴經説十種仙類別得生理壽千萬歲休止深山或大海島絶於人境報盡還來散入諸趣唯有淨土一門侶聖賢於剎那超三界而常樂故云國非界繫勝也出寂照集問曰兜率祈生好內院更無回答曰誰如師子覺外院尚耽迷十疑論第七云問曰彌勒菩薩一生補處即得成佛上品十善得生彼處見彌勒菩薩何須求生西方答曰求生兜率理若相似若細比校大有優劣先論二種一者縱持十善恐不得生何以得知彌勒上生經云行衆三昧深入正受方始得生更無方便接引之義不如彌陀本願力光明力但有念佛衆生攝取不捨二者如釋迦佛在世之時大有衆生見佛不得聖果者如恆河沙彌勒出世亦爾大有不得聖果者未如彌陀淨土但生彼國已悉得無生法忍未有一人退落三界為生死業縛也又聞西國傳云有三菩薩修兜率一名無著二名世親三名師子覺約云先生兜率見彌勒者即來相報師子覺先亡數年無報次世親亡三年乃來報云天宮日長我生兜率禮彌勒佛聽其説法即來相報已三年也問師子覺如何云生兜率外院戀著天樂即不曾見佛且以菩薩而修兜率猶有戀著不見佛者此輪回根本是知兜率難修有墜非比西方易修無墜也又白蓮集先師讚毀疑第四云問曰慈恩法師千佛一數製上生經疏讚內院云生天宮有七易生淨土有十難聖師所説必不誤人未審如何和會答曰爾只知慈恩上生疏不知慈恩通讚疏彼通讚疏云淨土有十勝天宮有十劣却勸人求生淨土聖師製述豈自相違蓋為演教隨機各示方便此與世尊親説彌陀等經勸生西方又説上生經勸生內院意旨何異耶衆生機緣不同佛土攝受亦異譬如有人生緣在南具舟欲往吳越治裝問程智者應酬所問豈可却讚陸地之便稱秦蜀之利哉如此則只增惑亂不應利益通方達士隨願知歸淺見狐疑強生矛楯所謂醍醐上昧為世所珍遇斯等人翻成毒藥普勸後人勿以管見窺天蠡心測海疑謗佛土自結苦因深誡之哉深誡之哉又即司空大師念佛三昧儀云興宗皇帝御書問曰西方極樂世界今世凡夫合求生不余忝對曰夫人居浮世如客寄旅亭設得盡百年亦如經一瞬根被六塵外坌識遭三火內焚況無實樂可貪縱有虗華何戀是故西賢東哲繼武聯蹤考考厭處於塵寰念念欣趣於佛境或上祈慈氏願往天宮西禱彌陀求生淨土皆超凡之捷徑俱入聖之要門若就彼境以論則一處見異報化雙彰或約自心面辨則二義説殊易難兩具非此兜率定化定易非彼淨土定報定難謂兜率經中説有他方來會諸大菩薩住天冠中故若欲求生化兜率天則有七易若欲求生報兜率天則具多難以兜率天通報通化故求生者有易有難西方淨土亦有二種一化淨土經許凡夫二乘生故二報淨土論説女人二乘無故若欲求生報佛淨土準上生經疏則有十難若欲求生化佛淨土準諸經説還有十易一彌陀願重得生易如諸經二極樂不逆得生易無量壽經三十方諸佛攝受易稱讚淨土經四東方一佛助成易藥師本願經五二大聖者來迎易無量壽經六八大菩薩引去易亦藥師經七奉行十願得生易華嚴經行願品八書寫一經得生易決定光明經九散善回向得生易大寶積經十少時念佛得生易十六觀經以極樂上通報通化故求生者有易有難今我皇帝陛下生在人中獲居王位將今世果驗前世因必已曾發大菩提心必已曾修大菩薩行雖境強情逸時時應有於虧違而信逼志堅念念常思其善利早年已曾分受菩薩戒今歲再曾全受近住戒兼常念八菩薩亦恆持大悲心又於諸處廣作善利建寺即經齋僧作福若直求生報佛淨土是則實難若秖求生西方化土願見化身無量壽佛理甚相應不為越分以經疏説若受佛戒經於一日乃至七日供佛筵僧起塔建寺書經造像念八菩薩持大悲心回向願生西方極樂世界一切皆得如願往生生已即得見無量壽佛及八菩薩於無上道更不退轉更不復墮三惡道中其間苦惱一切並無富貴莊嚴不可勝説唯願專信勤持無得懷疑擬進擬退自餘凡庶例此知之問曰彌勒龍華會逢期亦出離答曰五十六萬載終是下生遲念佛鏡問曰當來彌勒下生之時三會説法度諸衆生得阿羅漢果何以不願求生云何求生彌陀淨土答曰彌勒未下生來不可待得何以得知上生經中所説釋迦牟尼佛入涅槃後經五十六億七千萬年然始下生又下生經云海水減至三千由旬彌勒乃出準法王本記釋迦涅槃已來始有二千餘年全未擬來不可候待衆生命短恐沈苦海多劫受殃不值彌勒今阿彌陀佛現在説法住極樂世界廣度衆生歸依西方早證道果矣今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無普光佛南無普明佛南無普淨佛南無多摩羅跋栴檀香佛南無栴檀光佛南無摩尼幢佛南無歡喜藏摩尼寶積佛南無一切世間樂見上大精進佛南無摩尼幢燈光佛南無慧炬照佛南無海德光明佛南無金剛牢強普散金光佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛南無栴檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛南無金剛華佛南無寶蓋照空自在王佛南無虗空寶華光佛南無琉璃莊嚴王佛南無普現色身光佛南無不動智光佛南無降伏諸魔王佛南無才光明佛南無智慧勝佛南無彌勒仙光佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜問曰厭苦生極樂豈是有慈悲答曰欲得治他病先須還自醫十疑論第一云問曰諸佛菩薩以大悲為業若欲救度衆生秖應願生三界於五濁三塗中救苦衆生因何求生淨土自安其身捨離衆生則是無大慈悲專為自利障菩提道天台智者答曰菩薩有二種一者久修行菩薩道得無生忍者實當所責二者未得已還及初發心凡夫凡夫菩薩者要須常不離佛忍力成就方堪處三界內於惡世中救苦衆生故智度論云具縛凡夫有大悲心願生惡世救苦衆生者無有是處何以故惡世界煩惱自強無忍力心隨境轉聲色所縛自墮三塗焉能救衆生假令得生人中得作國王大臣富貴自在縱遇善知識不肯信用貪迷放逸廣造衆罪乘此惡業一入三塗經無量劫從地獄出受貪賤身若不逢善知識還墮地獄如此輪回至於今日故維摩經云自疾不能救豈能救諸疾人又智度論云譬如二人各有親眷為水所溺一人情急直入水救為無方便彼此俱沒一人有方便往取船筏乘之救接悉得脫水溺之難新發意菩薩亦復如是未得忍力不能救衆生為此常須近佛得無生忍已方能救衆生如得船者也問曰臨終佛現處邪正如何知答曰天魔不敢現是佛更休疑白蓮集云問曰善境現時其事不定或邪或正臨終現時如何辨明苟若不識如何去取答曰念佛往生之人得諸佛護念故魔不敢現現者定是佛境故稱揚諸佛功德經云若有得聞無量壽如來名者一心信樂持諷誦念其人當得無量之福永當遠離三塗之厄臨命終時一心信樂念不忘捨阿彌陀佛將諸比丘往人前魔終不能毀壞斯等正覺之心所以者何其佛世尊興立大悲誓度一切無量衆生亦復護持十方世界一切衆生問曰無量人將化彌陀豈遍知答曰如月處虗空處處蒙光輝龍舒文云問曰修行精進者臨終之時佛與菩薩來迎且如十方世界有無量衆生精進焉能皆知期而往迎乎答曰佛身如月影現衆水水清而現故無前後去來故古人云大願聖人從淨土來來實無來深心凡夫往淨土去去實無去彼不來此此不往彼而凡聖會遇兩得交際彌陀光明如大圓月遍現十方水清而靜則月現金體月非趣水而遽來水濁而動則月無定光月非捨水而遽去在水則有清濁動靜在月則無取捨去來矣問曰西方十萬億路遠恐難歸答曰夢魂遊萬里何況仗佛威十疑論第九云問曰西方去此十萬億佛剎凡丈劣弱云何可到答曰為對凡夫肉眼生死心量説耳西方去此十萬億佛剎但使衆生淨土業成者臨終在定之心即是淨土受生之心動念即生淨土所以觀經云彌陀佛國去此不遠又業力不可思議一念即生彼不須愁遠又如人夢身雖在牀而心意識遍至他方一切世界如平生不異也生淨亦亦爾動念即生不須疑也又彌陀鈔間曰觀經云西方不遠且西方去此十萬億佛剎今云不遠者何也答曰有二義一往生不遠觀經云如彈指頃即得往生彼國二相迎不遠經云臨命終時阿彌陀佛與諸聖衆現在其前又遠近相對信念即近不信即遠也問曰若負殺生債冤業豈能離答曰往生成佛後同度更無疑龍舒文云問曰人平生為惡殺害衆生苦虗人民臨死念佛亦得往生其所殺所害之衆生懷冤枉之心何時而可解乎答曰生淨土得道之後皆能度脫一切怨親豈不勝怨怨相報彼此無出期者乎問曰臨終十念往何假預修持答曰人生有壽夭十橫恐難知慈恩通讚云問曰臨終作善便得往生何假預前修諸勝業答曰人生壽夭難測短長或即病困昏迷或即非時奄逝既闕生前之善難逃後世之殃預作善緣恐防斯咎群疑論云十種命終不得念佛一則善友未必相遇二則或疾苦纏身不遑念佛三或偏風失語不得稱名四或狂亂失心注想難尅五或俄逢水火不暇志誠六或輒遇豺狼無其善友七或臨終惡友壞彼信心八或飽食過多昏迷致命九或軍作鬪戰奄爾輪回十或忽墮高巖傷中身命如此不得待臨終十念也今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒南無世淨光佛南無善寂月音妙尊智王佛南無龍種上尊王佛南無日月光佛南無日月珠光佛南無慧幡勝王佛南無師子吼自在力王佛南無妙音勝佛南無常光幢佛南無觀世燈佛南無慧威燈王佛南無法勝王佛南無須彌光佛南無須曼那華光佛南無優曇鉢羅華殊勝佛南無大慧力王佛南無阿閦毗歡喜光佛南無無量音聲王佛南無山海慧自在通王佛南無大通光佛南無才光佛南無金海光佛南無一切法常滿王佛南無寶海佛南無寶英佛南無寶成佛南無寶光佛南無寶幢幡佛南無寶光明佛南無阿閦佛南無大光明佛南無無量音佛南無大名稱佛南無得大安隱佛南無正音聲佛南無無限淨佛南無月音佛南無無限名稱佛南無月光佛南無無垢光佛南無淨光佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜問曰蓮苞住胎日苦樂定難知答曰如在夜摩天妙樂不思議白蓮集云問曰未審花中受苦受樂耶答曰花中住處如忉利天夜摩天所受快樂故寶積經第十八云譬如三十三天夜摩天等八百由旬或五百由旬宮殿之內遊戲歡樂我見極樂世界人住胎者如夜摩天處於宮殿問曰智者心是佛愚人愛往西答曰根緣有利鈍演教各隨機寂照集云問曰六祖壇經云凡愚不了自性不識身中真佛西方願東東方願西悟人在處一種志公云智者知心是佛愚人愛往西方若果是真正法門何故二大士排遣答曰佛説法有隱顯教有權實人根有利鈍祖師有抑揚譬如受疾不同處方還異今有病熱發黃方大狂亂有善醫者必以寒藥治之豈可却讚乳石桂附有除寒起廢之功耶有偏見人聞寒藥有治熱之功遂云乳石桂附永不可用豈不謬哉祖師單傳心印志公方讚大乘直指人心見性成佛佛法雙亡不立文字當時人尚未信受豈可又教人念佛求生也圓機達士固自無疑求法初心定生猶豫但得意忘言融通了解自無矛楯也問曰無想是泥洹有想即為癡答曰誰留十六觀佛語敢生疑白蓮集云問曰般舟經云是我心作佛是我心見佛心有想為癡無想是泥洹今起想想佛豈不為癡耶答曰機差教別聖意難思遮表多門文旨非一或就理遮情隨有想而皆非或簡境對治約行須明違順順即善淨之想違即惡染之想若淨想想善則善境現若染想想惡則惡境現故方等賢護經云惡欲想女夢見於女善欲想佛夢見於佛令謂二想同名則善惡天隔不可聞想一槩厭之若苟厭之則違佛謗法違佛則非為佛子謗法則入十方泥犁可不慎乎況此觀行是三世諸佛淨業正因一切凡夫成聖元胎安得輕易而不遵哉問曰女人論中説不許生蓮池答曰蓮池才到者轉女化男兒白蓮集云問曰論士女人及根缺不生此云何通答曰此界女人求者得生生彼國時轉為男子問曰亦有修行者不樂見阿彌答曰宿無緣種故障重有何疑白蓮集云問曰亦有人不樂生極樂者何也答曰宿無緣種故執見分別故不樂也問曰設如不信敬毀謗有何非答曰阻他求生者多劫墮泥犁大乘懺悔儀第三卷云問曰設爾不信有何過失答曰稱揚諸佛功德經云其有不信讚歎稱揚阿彌陀佛名號功德而毀謗者是人命終具足五劫墮阿鼻獄具受衆苦又作餓鬼百千萬劫乃至畜生百千萬劫常為刀等之所害也出得字號又大彌陀經云其有人民男子女人聞阿彌陀佛聲不信有者不信經語不信有比丘僧心生狐疑都無所信者皆故從惡道中來生愚癡不解宿命殃惡未盡尚未當度脫故心中狐疑不信向耳又甘露疏云徵驗傳説大歷年中衡州有一夫曰張瑗以謗毀故病而身爛每至日晚見金剛力士身長三丈許著大坑中受極苦惱經於數旬作牛吼聲舌墮而卒瑗有兄弟數人為喜其謗總皆身爛舌墮相次而終此類甚多不能具述經傳所説深可怖畏今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無日光佛南無無量寶佛南無蓮華最尊佛南無身尊佛南無金光佛南無梵自在王佛南無金光明佛南無金海佛南無龍自在王佛南無一切花香自在王佛南無樹王佛南無勇猛執持牢仗棄捨戰鬪佛南無內豐珠光佛南無無量香光佛南無師子響佛南無大強精進勇力佛南無過去堅住佛南無鼓音王佛南無日月英佛南無超出衆華佛南無世燈明佛南無休多易寧佛南無寶輪佛南無常滅度佛南無淨覺佛南無無量寶華明佛南無須彌步佛南無寶蓮華佛南無一切衆寶普集佛南無法輪衆寶普集豐盈佛南無樹王豐長佛南無圍繞特尊德淨佛南無無垢光佛南無日光佛敬禮過去無數劫諸佛大師海德如來敬禮無量無邊盡虗空界無生法身菩薩無漏色身菩薩發心菩薩無邊身菩薩敬禮興正法馬鳴菩薩敬禮興像法龍樹菩薩南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆如上問答已經開示疑障消除心意泰然已信之後更不再疑從今已去至於往生願弟子某甲等承是懺悔所生功德速生淨土同成佛果受無盡樂駭使楷切勵音例跛布火切徒可切瞬音舜處三上音杵下居止也準此奄音掩遑音皇豺音柴傷中下去楯食尹切
