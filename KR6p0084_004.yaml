body:
  text: 往生傳録第四夫往生傳録者伏為三災劫近五濁時臨入地獄者如牛毛生蓮池者若麟角是以釋迦調御遺聖教於閻浮彌陀世尊度衆生於末法故得慈光願攝佛力難思有願必迎無機不被我等宿生何幸得遇斯門欲報佛恩輒集懺法援引往生事迹非敢攻乎異端依憑傳記明文實謂述而不作欲知安養路先看往生人今日道場同業大衆前已引教比證次明往生傳録是以博來教典該括古今開釋疑情徑超信地若登彼岸舟固可忘來者問津斯言勿忽無輒悔墮誤認疑城欲求往生先應禮懺救拔我等無始至今罪障消滅相與志心等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無三十六俱胝佛南無西方現在一切諸佛南無無量壽佛南無無量蘊佛南無無量光佛南無無量幢佛南無大自在佛南無大光佛南無光焰佛南無大寶幢佛南無放光佛如是等佛如殑伽沙住在西方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆善根心耳一一諦聽定意散心作觀念佛一日七朝一聲十念依經修持見聞隨喜盡得往生極樂世界各如本傳廬山遠公結社往生梁高僧傅第六云東晉僧惠遠法師雁門人居廬山與劉遺民等僧俗百二十三人結為蓮社以修淨土謂他日生蓮華中也遺民著文讚頌感一仙人乘雲聽法空中或奏清唄聲御長風法師澄心觀想初十年三覩聖相而遠公沈厚不言後七月遠又見阿彌陀佛身滿虗空圓光之中有諸化佛觀音勢至侍立在右又見水流光明分十四支一一支水流注上下自然演説苦空無常無我妙法如十六觀經所説佛告遠曰我以本願力故來安慰汝後七日當生我國見僧佛馱耶舍及慧持曇順住佛之側向前揖遠曰法師之志在吾先何來之遲也遠自見分明乃與其徒言之且曰始吾居此幸於淨土三覩聖相今復見之吾生淨土決矣次日寢疾至七日聖衆遙迎寂然而化時義十二年八月六日也同會一百二十三人前後皆生淨土具列文晉闕公則報現往生高僧傳云東晉闕公則遠公白蓮社中人已亡友人於東京白馬寺作忌曰林木殿宇皆作金色空中有聲云我是闕公則所祈往生極樂寶國今已遂矣故來相報言訖不現天台智者三昧往生往生傳云天台智者釋智顗字德安頴川人開皇十七年帝請授菩薩戒還山一心在定他日由定起謂弟子智越曰吾之幻質且夕云滅汝於石城嚴持香花俟吾以謝此報身及顗至施牀西向專念彌陀佛與二菩薩及於淨土化佛與菩薩來相遮護又命侍者讀無量壽經一心靜聽經竟乃顧大衆合掌讚曰四十八願莊嚴淨土花池寶樹易到無人火車相現一念改悔者尚得往生況戒定熏修聖行道力實不唐捐豈不生耶又囑弟子多然香燭又挹三衣鉢杖置於身側有欲進齋食者師曰能無攀緣即真齋矣又索香湯漱淨舌根説十如四不生十法界三觀四智四無量六波羅蜜等法僧有問其所證師曰吾不領衆必淨六根為他損己退歸五品位耳又曰人命將終聞鍾磬聲增其正念汝宜鳴磬以增吾念即見彌陀觀音勢至聖衆幡花來迎於彌陀像前端坐終焉弟子等迎歸佛隴嵓大業元年九月煬帝遣使入山設忌齋集僧開石室唯見空榻而已後魏曇鸞神異往生往生傳云後魏壁谷僧曇鸞初自陶隱居得仙經十卷鸞欣然自得以為神仙必可致也後遇僧菩提留支問云佛道有長生乎能却老為不死乎支云長生不死吾佛道也遂以十六觀經與之云汝可誦此則三界無復生六道無復往其為壽也有劫石焉有河沙焉沙石之數有限壽量之數無窮此吾金仙氏之長生也鸞深信之遂焚仙經而專修觀經雖寒暑之變疾病之來亦不懈怠魏主憐其志尚又嘉其自行化他流傳甚廣號為神鸞一日告弟子云地獄諸苦不可以不懼九品淨業不可以不修因令弟子高聲念阿彌陀佛鸞向西閉目叩頭而亡是時僧俗同聞絃管之聲從西而來良久乃止至唐貞觀三年四月八日道俗集其寺為如來降生之日且見鸞法師於空中乘七寶船指道綽曰汝于淨土堂宇已成但唯報命未盡耳復見化佛菩薩飄飄在空衆乃驚歎大生信服雖無種衆闡提亦所服之前唐少康放光往生往生傳下卷睦州釋少康貞之初至洛下白馬寺見殿中文字纍放光明探取之乃善導西方化導文也康曰若於淨土有緣當使此文再發光明言未已光乃閃爍遂至長安善導影堂大陳蔫獻善導於空中曰汝依吾事利樂有情則汝之功同生安養又逢一僧謂曰汝欲化人當往新定言訖遂隱新定今嚴州也至彼人尚無識者康乃乞錢誘小兒與之約曰阿彌陀佛是汝本師能念一聲與汝一錢小兒務得其錢隨聲念之後月餘小兒念佛求錢者衆康乃云念佛十聲乃與爾錢小兒從之如此一年無長少貴賤凡見康者則稱阿彌陀佛以故念佛之人盈於道路後康於烏龍山建淨土道場康外座令人面西康先唱阿彌陀佛次衆人和之康唱時衆見一佛從其口出連唱十聲則有十佛若聯珠狀康云汝見佛不如見佛者決生淨土其禮佛人數千亦有竟不見者後囑衆人當於安養起增邊心於閻浮提起厭離心又云汝等此時能見光明真我弟子遂放異光數道而亡啓芳圓果聞鍾往生往生傳云唐初州僧啓芳圓果二法師精心觀想淨土後五月於觀想中同覺身臨七寶大池間有大寶帳身入其中見觀音勢至坐二大寶蓮華下有蓮華彌滿千萬見阿彌陀佛從西來坐一最大蓮華迭出光明相照芳等禮佛問云閻浮衆生依經教念佛得生此不佛云如念我名皆生我國無有一人念而不生者又聞釋迦佛與文殊菩薩稱讚淨土其前又有大殿殿有三道寶階第一道純白衣第二道僧俗相半第三道唯僧無俗佛指之謂芳等云此皆南閻浮提念佛衆生遂生於此汝宜自勉芳果既寤歷與其徒言後五月二人無病遽聞鍾聲他人不聞芳果云鍾聲乃我事頃刻二人同終台州懷玉金臺往生往生傳云懷玉丹丘人注想淨業近四十年天寶元年玉念佛間忽見西方聖衆數若恆沙中有一人手擎銀臺前以示玉玉曰如玉者本望金臺何為銀臺耶臺乃隱人亦隱於是彌加精苦至三七日向之擎臺者復來告云法師以精苦故得升上品又云上品往生必先見佛可趺坐以俟佛來未旋踵間異光照室又三日異光再發玉曰若聞異香我報身即盡次日書偈云清淨皎潔無塵垢蓮華化生為父母我經十劫修道來出示閻浮厭衆苦一生苦行超十劫願離娑婆歸淨土偈畢香氣四來弟子有見佛與二菩薩共乘金臺傍千百化佛自西而下迎玉玉恭敬合掌含笑長歸相州道昂樂西往生續高僧傳第二十卷云唐相州寒陵山釋道昴未詳姓氏志結西方願生安養後自如命極預於春首告諸有緣至八月初當來取別未測其言也期月既臨一無所患齋時即升高座身含奇相爐發異香援引四衆授菩薩戒詞理要切聞者寒心於時七衆圍繞昂目高視乃見天衆繽紛絃管繁雜空中有清音遠徹告於衆曰兜率天樂下迎昂公昂曰天道乃生死根本由來非願我常祈心淨土如何此誠不從遂耶言訖便覩天樂上騰須臾還滅便見西方香華伎樂充塞如團雲飛湧而來旋環頂上舉衆皆見昂曰大衆好住今西方靈相來迎事須聞往言訖但見香爐墜手於高座上端然而終即貞觀七年八月也隋二沙彌同時往生往生傳云隋并州文水縣開化寺有二沙彌其少者語其長者言兄作淨土業莫間過日其長從之同念阿彌陀佛才經五年其長沙彌先死往生淨土見阿彌陀佛坐百寶蓮華作紫金色既瞻禮已不勝欣慶即白佛言弟子有一小同學今在閻浮提中同作行業不委得生此土以不世尊報言汝本無心念吾名號是彼教汝汝既得生彼何疑矣放汝還去勤行淨業正念我名三年已後共彼同來遂即還活小沙彌聞悲喜流淚不捨晝夜專心念佛既至三年二沙彌心眼開明即見彌陀與諸聖來迎大地震動又見天花遍滿虗空此二沙彌見已忽然無病一時命終同往淨土大業十二年也明州可久報信往生往生傳云明州僧可久常誦法華經故號久法華平生修淨土業元祐八年八十一坐化三日却還説淨土事興十六觀經所説一同見蓮華臺皆標合生者姓名一紫金臺標云大宋城都府廣教院熏法華已坐其中又以金臺標云明州孫十二郎合生其中又一金臺標云久法華又一銀臺標云明州徐道姑語訖復化去五年徐道姑卒異香滿室又十二年孫十二郎卒天樂盈空今日道場同業大衆如上所説僧衆往生今為僧者當自念云我為出家人了達生死乃本分事不應如此汩沒塵俗一日大限到來有何倚賴雖作世善不免輪回如修淨土速脫生死面見彌陀方是出家事畢又轉以化人以己為名僧必信從其言所為利益無有窮已必上品往生相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無拘樓孫佛南無拘那含牟尼佛南無迦葉佛南無師子佛南無明炎佛南無牟尼佛南無妙華佛南無華氏佛南無善宿佛南無導師佛南無大臂佛南無大力佛南無宿王佛南無修藥佛南無名相佛南無大明佛南無炎肩佛南無照曜佛南無日藏佛南無月氏佛南無衆炎佛南無善明佛南無無憂佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜長安淨真授記往生往生傳云唐長安尼淨真住積善寺衲衣乞食一生無嗔誦金剛經十萬遍專精念佛顯慶五年七月染疾語弟子曰五日內十度見阿彌陀佛觀音勢至菩薩僧衆不可稱數如來放光照吾身及室內咸皆洞明又兩度見極樂國土莊嚴之事寶樓閣池雜色蓮華開敷水上金沙德水諸天童子遊戲池中聞殊香芬郁亦見紫金臺聞天音樂千萬諸佛皆真金色與吾授記當得作佛吾得上品往生言訖跏趺而逝光照一寺丹陽道瑗佛現往生往生傳云劉宋丹陽尼道瑗少聰悟成戒之後研味三藏尤得其要大造佛像以廣福業又造金無量壽像一軀願憑其福接置西方明年夏四月十一日像於眉間大放光明照寺內盡如金色於金色中無量壽佛與瑗記曰汝捨此報必遂依我當善護持勿生疑慢瑗得其記彌增感悅於其月望日就其像前端坐入滅洛陽悟性中品往生往生傳云尼悟性浴陽人於衡州遇照闍梨發願念佛因大曆六年入廬山忽病聞空中音樂尼曰我得中品上生見同念佛人西方盡有蓮華也身皆金色時年二十四尼大明月聞香往生往生傳云汾州平遙度脫寺名尼大明月師玄中寺綽禪師學念佛三昧以為真極每欲稱念阿彌陀佛必換淨衣口含沉香燒衆名香熏所居室三年不斷臨終舉寺咸覩聖衆奇光光中聞沉水香尋卒今日道場同業大衆如上所説尼衆往生今為尼者當發願云常奉三歸恆除五障又能精心觀想不久見佛此報身盡必定往生相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無提沙佛南無明耀佛南無持髻佛南無功德明佛南無示義佛南無燈曜佛南無興盛佛南無藥師佛南無善濡佛南無白毫佛南無堅固佛南無福威德佛南無不可壞佛南無德相佛南無羅睺佛南無衆主佛南無梵聲佛南無堅際佛南無不高佛南無作明佛南無大山佛南無金剛佛南無將衆佛南無無作佛南無珍寶佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜烏長國王見佛往生往生傳云烏長國王萬機之暇謂群臣曰朕為人主不免生老病死無常之苦六趣輪回誰分貴賤聞西方佛國誓願棲神於是日夜精勤念佛行道廣行布施利樂衆生每日設一百僧齋王與后妃親手行食時請名僧咨扣妙法三十餘年精專無替一日宮中見彌陀佛西方聖衆來迎祥瑞不一端坐示滅神色怡悅學士張抗持課往生往生傳云晉翰林學士張抗平生積善信重佛門誓課大悲心十萬遍願生西方課畢年遇六十忽寢疾唯念阿彌陀佛謂家人云西方淨土元只在堂屋西間之內阿彌陀佛座蓮華上翁兒在蓮華池金池地上禮佛嬉戲言訖念佛而亡翁兒乃孫子名方三二歲而亡矣晉劉遺民摩頂往生往生傳云東晉逸士劉程之字仲思號遺民依遠公共修淨土專坐禪作觀想法方半歲即於定中見佛光照耀又地皆金色居山十五年末年又於想念佛中見阿彌陀佛身紫金色毫散照埀手下接以臨其室程之慰幸悲泣自陳曰安得如來為我摩頂以衣覆我佛乃為摩其頂引袈裟以覆之他日想念又見身入七寶大池蓮華清白相間其水湛湛如無邊岸中有一佛頂有圓光𦚾有卍字指池水曰八功德水汝可飲之程之飲水甘美盈口乃還猶覺異香發於毛孔乃曰淨土之緣至矣廬阜諸僧皆來會程之對佛像焚香再拜祝曰我以釋迦遺教故知有阿彌陀佛此香當先供養釋迦如來次供養阿彌陀佛復供養法華會中佛菩薩衆以至十方佛菩薩衆願令一切有情俱生淨土祝畢與衆話別面西端坐斂手氣絶年五十九信士牧鄉執幡往生往生傳云唐信士鄭牧卿滎陽人舉家奉佛母及姊妹同祈淨方至開元二十一年因疾困篤有醫人及同道者咸勸喻謂且進魚肉以救羸軀痊復之後修持淨戒不亦可乎牧卿曰噫如此浮生縱因葷穢而得痊乎終歸磨滅不奉佛禁而惜微命何為確然不許遂嚴佛事手執幡腳香爐一心稱念阿彌陀佛復作是言丈夫一心不退願往西方奄然長往異香充庭鄰里共知舅氏夢寶池花敷見牧卿合掌趨上時當五十九京兆房翥勸化往生彌陀感應圓云唐房翥京兆人暴死至陰府見閻羅王王曰據案簿君曾勸一老人念佛已生淨土君承此福亦合生淨土故來相見翥曰先許金剛經萬卷巡禮五臺未欲往生王曰誦經巡禮固為好事不如早生淨土王知意不可奪乃放還以此知勸人修者非徒往生又感動幽冥也宋郡希文神遊脫難龍舒文云鎮江郡彪字希文為士人時夢至一官府人皆稱安撫彪自喜曰豈非豫及第後作安撫乎行至前見一宮員問曰汝知汝未及第因不對曰不知令引彪去看見一大鑊煮蛤蜊見彪乃作人聲叩彪姓名彪遂念阿彌陀佛方念一聲蛤蜊皆變作黃雀飛去彪後果及第至安撫使以此見殺生阻人前程不可不誡又見佛力廣大不可不誡又見佛力廣大不可不敬官職自有定分不可苟求參軍仲回問疑往生往生傳云王仲回光州司士參軍也無為郡人因陳本郡圬垾水利大司農得其實請朝廷推恩乃有是命其為往信厚未嘗與人校短長天衣懷禪師住鑯佛道場時亦嘗諸問而鄉里以善人稱之既而信向淨土但未具深心耳至元祐初問余曰經典多教念彌陀生淨土祖師則云心即是淨土不用更生西方其不同何耶答曰實際理地無佛無衆生無樂無苦無壽無夭又何淨穢之有豈得更以生不生為心耶此理奪事也然而處此界者是衆生乎是佛乎若是佛境界則非衆生又何苦樂壽夭淨穢之有哉試自忖思或未出衆生之境則安可不信教典志心念彌陀而求生淨土哉淨則非穢樂則無苦壽則無夭矣於無念中起念於無生中求生此以事奪理也故維摩經云雖知諸佛國及與衆生空而常修淨土教化於群生又問如何得念不間斷答曰一信之後更不再疑即是不間斷也司士欣躍而去至二年十二月旦之夕余守丹陽郡忽夢司士云向蒙指示淨土今已得生特來相謝乃再拜而去翌日召丹徒令陳安止語其夢蓋陳令深信淨土故也後數日得司士之子進士術哀計乃知信然又聞司士未亡七日已前預知時至與鄉舊為別余弟作亦在坐屢有見謝之語然則司士決生淨土矣元祐四年四月八日無為揚傑述今日道場同業大衆如上所説男衆往生今為士丈夫當自念云光陰迅速幻身難保不如每朝以頃刻之暇修西方法門現世可以消災身後更無苦趣若發大菩提心轉以化人其為福報豈易量耶身後必得往生相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方呵彌陀佛南無當來彌勒佛南無七佛南無十方十佛南無三十五佛南無五十三佛南無百七十佛南無莊嚴劫千佛南無賢劫千佛南無星宿劫千佛南無十方菩薩南無十二菩薩南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜隨文皇后異香往生往生徵驗傳云隋文帝后雖居王宮深厭女質常誦阿彌陀佛至臨終時異香滿室從空而至文帝問闍提三藏是何祥瑞答曰西方有佛號阿彌陀皇后業高神生彼國況聖教分明無致疑矣荊王夫人立化往生龍舒文云荊王夫人元祐間與婢妾精修西方唯一妾懈怠夫人斥去其妾悔悟精進久之謂他妾云吾今夜當生西方是夜異香滿室無疾而終明日同事之妾告夫人云昨夜夢化去之妾託致起居云夫人訓責我修西方今以獲往生感德無量夫人云使我亦夢乃可信耳其夜夫人夢見亡妾敘謝如前夫人云西方可到不妾云可到但從妾行夫人隨之見池溏廣大紅白蓮華大小相間或榮或悴種種不同夫人問云何以如此妾云此皆世間發念修西方人也才發一念池內便生蓮華一朵若願心精進則華日日敷榮以至大如車輪若願心退轉則華日日萎悴以至殞滅次見一人坐蓮華上其衣飄揚散去寶冠瓔珞莊嚴其身夫人問云何人也妾云揚傑也又見一人坐於華上妾云馬玗也夫人云我當生何處妾引行數里許遙望見一金壇金碧照曜妾云此夫人化生處乃上品上生夫人既覺防問楊馬所在傑已亡而玗無恙是知精進不退者雖身在娑婆之內其神已在淨土矣後夫人於生日秉爐焚香望觀音閣而立子孫方具獻壽之儀已立化矣夫人馮氏病差往生龍舒文云馮氏夫人名法信贈少師諱詢之女適陳宣使陳思敬少多疾及嫁疾尤甚醫者以為不可療往見慈受深禪師問愈疾之方深教以持齋誦佛夫人盡去葷血及莊飾之奉衣掃塔服專以西方為念行坐語默動靜皆西方也剎那之次念秋毫之善酌水獻華誦經行道一以為西方之津糧十年間無惰容心安體健神氣昌旺人皆尊向之一日忽書偈云隨緣任業許多年枉作老牛為耕田打疊身心早歸去免教鼻孔受人穿族黨怪之夫人云行即西歸何怪之有乃臥疾微有喘息忽矍然而起云吾神遊淨土面禮彌陀觀音左願勢至右盻百千萬億清淨佛子稽首慶我來生其國若宮殿林沼光明神麗與華嚴經及十六觀經所説一同明日安然化去家人聞妙香芬馥不類人間及三日茶毗舉戶如生觀音縣君侍女往生龍舒文云觀音縣君姓吳氏其夫都官員外郎呂宏亦悟佛理夫婦各齋戒清修吳氏有二侍女亦絶葷血勤力助為勝業其一頗好禪理既病猶怡然笑話而逝如委脫然其一奉戒尅苦或終月不食但日飲吳氏所呪觀音淨水一盞而已忽見金蓮捧足者三數日見其膝又數日見其身又數日見其面目其中乃阿彌陀佛左右則觀音勢至也又悉見其堂殿國界皎如指掌曉然知其為淨土問其詳則云彼皆清淨男子經行遊樂無女人也又問彼佛如何説法云我得天耳故但見問答指顧而不能聞所説也如是者三年未嘗一瞬不在目前忽感疾自言往生乃終吳氏事觀音有靈感每於淨室列置瓶缶數十以水注滿手持楊枝誦呪必見觀音放光入瓶缶中病苦者飲水輒愈所呪水積歲不壞大寒不凍世號觀音縣君信女梁氏目明往生往生傳云唐清信女梁氏括州人也宿殃所鍾雙目無見遇僧勸令念佛一聞教誨係心相續三年之後兩目洞開無復纖翳所患既痊勤苦彌切至貞觀三年二月中不豫自知報盡臨終之時合村共見阿彌陀佛與諸大士幡華降迎遂終于世溫文靜妻辭親往生往生傳云唐并州晉陽縣溫文靜妻先患半身不遂寢臥床枕其夫告曰終朝臥地何不念佛其妻問曰念何佛夫曰念阿彌陀佛妻奉教而念二年之中精志不絶罪障消殄彼佛現前金光洞徹備覩聖妙之事於是極懷悲愧謝其夫曰長病多時惱亂不少蒙教念佛感應殊異後日報終當往生彼國請告父母兄弟諸親設齋取別文靜初未信之試集親賓一依請請齋訖信女辭曰今隨佛後往生西方惟願父母親屬勤心念佛於後生來念佛一門功德不可思議言罷即正坐西向自稱佛號舉家齊念見佛來迎寂然而終姚范行婆佛候往生往生傳云姚行婆上都人貞觀年中因范行婆勸念阿彌陀佛臨終時見佛來迎乃曰未與范行娑別請佛暫駐相待佛處虗空候范行婆至手執香爐奄然而逝世子童女勸母往生法苑珠林云童安宋朝魏世子梁郡人父子三人俱修西方唯妻不修安年十四死後七日却回啓母曰兒往西方父兄及己已有蓮華後當化生唯母獨無兒今暫歸相報至後母依兒教曰念彌陀四人盡得往生安養矣今日大衆如上所説女衆往生今為女衆當自念云據佛所言欲心重者受婦女身已非善業若不自省更加嫉妬貪欲業緣轉深果報可畏若能回心懺悔絶其非念仁慈以待婢妾溫和以禮上下常念阿彌陀佛定生極樂世界若轉化親戚及婢妾其福報無窮必上品生相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛又復歸依十方盡虗空界無量形像優填王金像栴檀像阿育王銅像吳中石像師子國王像諸國土中七寶像真珠像摩尼寶像紫磨上色閻浮檀金像又復歸依十方如來一切髮塔齒塔牙塔爪塔頂骨塔一切身中諸舍利塔袈裟塔匙鉢塔澡瓶塔錫杖塔如是等為佛事者又復歸依諸佛生處塔得道塔轉法輪塔般涅槃塔多寶佛塔阿育王所造八萬四千塔天上塔人間塔龍王宮中一切寶塔又復歸依十方盡虗空界一切諸佛歸依十方盡虗空界一切尊法歸依十方盡虗空界一切賢聖南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜犯戒雄俊暴亡往生往生徵驗傳云唐釋雄俊城都人善講説無戒行所得施利非法而用又曾還俗入軍營殺戮逃難再入僧中大曆年中忽死見閻羅王判入地獄俊高聲曰雄俊若入地獄三世諸佛即成妄語觀經云下品生者造五逆罪臨終十念尚得往生俊雖造罪不作五逆若論念佛不知其數言訖往生西方乘臺而去販雞鍾馗念佛往生往生傳云張鍾馗同洲人販雞為業永徽元年臨終見宅南群雞集忽見一人著緋皂幘驅雞唱言啄啄其雞四交上兩眼出血在牀至苦時值普光寺僧導令鋪聖像念阿彌陀佛忽聞異香奄然而逝屠牛善和十念往生往生傳云唐張善和殺牛為業臨終見牛數頭作人言云汝殺我善和大恐告妻云急請僧來救我僧至云十六觀經説若人臨終地獄相現志心十稱南無阿彌陀佛即得往生淨土善和不暇取香爐即以左手擎火右手捻香面西專切念佛未滿十聲乃云我見阿彌陀佛從西而來與我寶座言訖而終冤鬼仲舉急念往生龍舒文云仲舉姓陳又名仙龍舒郡望江人也嘗妄殺人後見鬼現仙畏懼急急念阿彌陀佛鬼不敢近仲舉念佛不已鬼遂不現後常念佛臨終坐化後半年附本家孫女名妙光云我因念彌陀已生極樂世界舉動言語一如平生親戚相知皆來看至兩三日家人云惜乎你在生時不曾傳得喜神供養仲舉遂現儼然如平生唯面帶少顏蓋西方長生不老其頭如佛之螺髻望江人周憲叔於王日休處言之瘤病吳瓊一聲往生又臨安府仁和吳瓊先為僧後還俗前後兩娶生二子屠沽無所不為常與人作厨子每殺雞鴨等物命以手持起叨云阿彌陀佛子好脫此身去遂殺之連稱佛數聲每切肉時一面切肉一面念阿彌陀佛常念不輟教村中人念經修懺及勸人念阿彌陀佛後眼上生瘤如雞子大乃憂怖造一草庵分散其妻子晝夜念佛修懺紹興二十三年秋告村中人云瓊來日戌時去也人皆笑之將用碗鉢鍋子盡與人次日晚報諸道友行婆云瓊去時將至盡來與瓊高聲念佛相助將布衫當酒飲了即寫頌云似酒皆空問甚禪宗今日珍重明月清風端坐合掌念佛叨一聲佛來即化去今日道場同業大衆如上所説造惡行凶冤業病苦亦得往生勸罪惡人當自念云我平生罪惡既多一旦瞑目之後將如之何須急懺悔回心念阿彌陀佛發大願云願我見佛得道之後盡度從生以來所害衆生皆生淨土相與志心等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無華日佛南無軍力佛南無華光佛南無仁愛佛南無大威德佛南無梵王佛南無量明佛南無龍德佛南無堅步佛南無不虗見佛南無精進德佛南無善守佛南無歡喜佛南無不退佛南無師子相佛南無勝知佛南無法氏佛南無喜王佛南無妙御佛南無愛作佛南無德臂佛南無香象佛南無觀視佛南無雲音佛南無善思佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆如上往生傳中所説人等已離穢土俱趣淨方孕七寶池捨脆胎苦不歷三祗便成佛道今欲速超生死得涅槃常樂無出往生一門矣麟音鄰唄音貝揖伊入切顗音蟻余頃切俟牀史切施牀上式支切設也捐音緣挹音邑煬音樣榻音塔綽昌約切探音貪取也寤音悟踵之隴切昂五剛切援音園姑卒下子律切郁於六切𩬞音鬘濡音儒替音剃怡為支切嬉許其切阜扶九切榮音螢噫於其切葷音熏確苦角切翥章庶切彪悲幽切蛤音閣蜊音利圬音烏垾音𢍉翌於計切訃音赴仵音五斥音尺萎於為切悴秦醉切殞于敏切玕音盂恙音樣衣掃上去著也旺于放切喘音舛矍居縛切盻匹莧切蛻音稅缶方負切括古活切係心上音計駐音注戮音六幘音責仙呼煙切瘤音溜娶音趣輟
