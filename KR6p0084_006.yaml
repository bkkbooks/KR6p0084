body:
  text: 禮懺罪障第六夫禮懺罪障者禮謂禮佛懺謂懺罪真性本空曾無一物妄心既作遂有萬端罪起之源於斯為最由是三毒內發十惡外彰舉足盡是無明觸目皆成有漏十二支而因緣不斷十八界而生滅無窮生天上而每遇五衰處人間而常遭八苦無逾六趣難出四生俱處輪回未蒙解脫欲成淨果須懺業因信悲相接則何罪不除凡聖交通則何障不遣欲入往生之路須歸禮懺之門罪障既以消除身心必然清淨六門冷落悉亡久翳之塵一性圓明定發本來之照但得雪消去自然春到來今日道場同業大衆前以廣明極樂莊嚴勝妙樂事隨喜已竟喜躍無量歎未曾有今乃將陳發露略啓二門先懺自身後代父母且自身者一心既運三寶復歸各運虔誠求哀發露我等佛子自從無始曠大劫來無明覆心迷自佛智妄惑造業生死轉回背佛法僧隨惡師友眼根著色為恩愛奴不覩如來法身周遍耳貪聲境殘害無窮不聞如來圓音妙法鼻貪香氣結使是生功德妙香不能嗅覺舌貪衆味餐噉衆生妄言綺語惡口兩舌毀謗三寶陵辱尊親豈餐如來甚深法味身根著觸耽染無窮晝夜荒迷不知止足備造諸惡行殺盜染諸佛慈光不能照矚意根著法觸境攀緣念念常生貪嗔邪見一切諸惡從意根生寧知如來甚深法界六根三業備造諸罪展轉無窮備障衆善不能發起大菩提心不能修行一切善法長夜受苦無有厭心如是等愆唯佛知覺念悉禮懺永斷相續又此罪障從顛倒生無有定實本唯空寂唯願西方阿彌陀佛慧日垂光消我身心業惑霜露慈風普振摧重業山法水長流洗我心垢惟願我等及與父母速達心本永滅罪根法界衆生同得清淨又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆伏為自身斷除無量怨結罪障等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無月面佛南無寶燈佛南無寶相佛南無上名佛南無作名佛南無無量音佛佛南違藍佛南無師子身佛南無明意佛南無無能勝佛南無功德品佛南無月相佛南無得勢佛南無無邊行佛南無間華佛南無淨垢佛南無見一切義佛南無勇力佛南無富足佛南無福德佛南無隨時佛南無廣意佛南無功德敬佛南無善寂滅佛南無財天佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆重復志誠求哀懺悔衆等應思父母在昔人中因其愛子之私以召危身之禍罪因我積禍乃及親俯首三思良增悲慟今伸歸命泣血求哀庶憑三寶之威以滅雙親之罪相與痛切五體投地含悲哽噎雨淚交流弟子某甲等奉為無始劫來至於今日法界父母眷屬親緣今對彌陀及十方三寶志心思念我之父母昔因癡愛保惜我身如經所説懷耽守護就濕回乾咽苦吐甘乳哺養育乃至究竟憐愍造無限罪欺賢誣聖給我衣食殺害生靈滋我口腹愚迷顛倒癡愛纏綿致使命終沈淪惡道皆因我身昔時負纍是故我今身代父母從始至今所有殺生偷盜不淨邪淫妄言綺語惡口兩舌及貪嗔癡十惡熾然無罪不造隨順邪師不信三寶或破五戒八戒十戒乃至具足闡提撥無因果誹謗大乘方等經典破人善事無慈愍心不肯歡進同梵行者乃至殺父殺母殺和尚阿闍利出佛身血破羯磨轉法輪僧殺阿羅漢破塔壞寺殘毀經像驅役僧徒或令罷道侵損玄用現前十方三寶財物不淨説法汙梵行人如是普於三寶師長父母法界衆生邊造種種罪自作教他見作隨喜重重重重無盡無盡遍周法界充塞虗空今對阿彌陀佛皆悉懺悔惟願阿彌陀佛威神力故如湯消冰應念化成無上智覺又復阿彌陀佛四十八願憐愍有情放淨光明攝取不捨所居極樂衆寶莊嚴菩薩往生永不退轉修行無間直至菩提本師釋迦牟尼及十方諸佛殷勤勸讚一念乃至十念一日乃至七日稱名繫念決定往生我等愚迷不信不順或時聞已心則輕笑見念佛人惡心毀破設有信者無決定心業緣深重世務牽纏身在道場心緣世諦口談極樂意戀娑婆於念佛時心多散動三種淨業片善無成十六觀心一事不徹雖為出家不修僧行唯貪利養毀戒破齋誑惑衆生妄稱師匠非法説法法説非法未得謂得未證謂證口口説空步步行有無慚無愧不覺不知如斯等罪無量無邊願乞除滅又有衆生不信出家是解脫道深著五欲不樂往生不修梵行佯作善人念珠在手毒惡存心恣騁無明堅牢鬪諍橫起是非不分邪正明附惡友惱亂行人陷己陷他為地獄種魔彼魔此障淨土生如是等罪無量無邊願乞除滅臨命終時或遭橫死牆崩屋倒樹折巖摧水火漂焚蟲傷獸齧刀兵遽至毒藥暴傷卒病臨身不遑念佛或纏綿重病苦迫身心宛轉號呼難安正念或無善友助發淨因由是種種罪障因緣臨命終時不得見佛不得往生流轉娑婆五濁惡世三塗八難隨業受生五痛五燒最為極苦未來生死無有盡期或墮胎生金鎖之難五百歲中不得見佛此皆從昔已來不信阿彌陀佛不信往生淨土身口意業輕慢毀謗以是因緣雖復發心多諸障難我今稽首阿彌陀佛惟願天眼天耳他心大慈大悲哀愍攝受聽我懺悔令我父母及法界衆生報障業障煩惱障不信佛言障不樂修行障五濁惡世障邊地疑城障不聞三寶障凡是往生一毫之障悉願消除一切清淨正信現前不疑不退決定往生極樂世界速成正覺轉大法輪圓滿普賢廣大行願懺悔已歸命禮阿彌陀佛今日道場同業大衆今復普為一切四生六道無量有情自他父母或在家出家無始至今造諸罪業障往生路障淨土生一切罪障願乞除滅相與志心等一痛切五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無淨斷疑佛南無無量持佛南無妙樂佛南無不負佛南無無住佛南無得叉迦佛南無衆首佛南無世光佛南無多德佛南無弗沙佛南無無邊威德佛南無義意佛南無藥王佛南無斷惡佛南無無熱佛南無善調佛南無名德佛南無華德佛南無勇德佛南無金剛軍佛南無大德佛南無寂滅意佛南無香象佛南無那羅延佛南無善住佛南無無所負佛南無月相佛南無電相佛南無恭敬佛南無威德守佛南無智日佛南無上利佛南無須彌頂佛南無治怨賊佛南無蓮華佛南無應讚佛南無知次佛南無離憍佛南無那羅達佛南無常樂佛南無不少國佛南無天名佛南無見有邊佛南無甚良佛南無多功德佛南無寶月佛南無師子相佛南無樂禪佛南無無所少佛南無遊戲佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆某甲等又以無始已來至於今日輪轉六道受四生身或男或女非男非女遍一切處起無量罪或為大身衆生更相食噉或為細身衆生更相食噉以強陵弱有如是等相食殺業無量無邊障菩提心障菩提願障菩提行障淨土生今日懺悔願乞除滅某甲等自無始已來至於今日於六道中受四生身於其中間所起罪惡無窮無盡如是等罪唯有十方三世諸佛大地菩薩盡知盡見如諸佛菩薩所知所見罪惡多少今日志誠稽顙求哀慚愧懺悔已作之罪願盡消滅未作之罪不敢復作仰願十方三世一切諸佛以大悲心受某甲等今日懺悔以大悲水洗某甲等能障菩提一切罪垢畢竟清淨令得往生西方淨土相與志心歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無三十五尊懺悔佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛南無寶炎佛南無寶月光佛南無不空見佛南無寶月佛南無無垢佛南無離垢佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無栴檀功德佛南無光明吉祥佛南無光德佛南無無憂德佛南無那羅延佛南無功德華佛南無蓮華光遊戲神通佛南無才功德佛南無德念佛南無善名稱功德佛南無帝幢王佛南無善遊步功德佛南無鬪戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無寶蓮華遊步佛南無寶蓮華善住娑羅樹王佛南無一十二尊懺悔佛南無寶勝藏佛南無寶光王火𦦨照佛南無一切香華自在力王佛南無百億河沙決定佛南無振威德佛南無金剛堅強消伏壞散佛南無寶光月殿妙音尊王佛南無歡喜藏摩尼寶積佛佛名下注語準上不須讀南無無盡香勝王佛若有衆生持念此佛名者即得超越無量劫生死之罪當得宿命智南無師子月佛若有衆生聞此佛名生生之處常得遠離畜生之身滅除無量劫生死之罪南無歡喜莊嚴珠王佛若有四衆聞此佛名五體投地歸依頂禮即得超越五百萬億阿僧祇劫生死之罪南無帝寶幢摩尼勝光佛若有四衆聞此佛名歸依頂禮超越五百萬億劫生死之罪南無東方解脫主世界虗空功德清淨微塵等目端正功德相光明華波頭摩琉璃光寶體香最上香供養訖種種莊嚴頂髻無量無邊日月光明願力莊嚴變化莊嚴法界出生無障礙王如來阿羅訶三藐三佛陀一拜此一佛名號出五千五百佛名經第一尊佛名也經云若有人犯四重五逆誹謗三寶及犯四波羅夷是人罪重假使閻浮提地碎為微塵一一微塵成於一劫是人有若干劫數罪若能稱念此一佛名號八十二字一遍禮一拜者如上等罪悉皆消滅南無西方淨土極樂世界三十六萬億一十一萬九千五百同名同號大慈大悲阿彌陀佛此上佛號名曰彌陀大課寶王論云釋迦佛在世時有翁婆二人用穀一斗記數念阿彌陀佛願生西方佛云我別有方便令汝念佛一聲得多穀之數乃教念上佛名嘗以淨穀挍之六百萬粟為一斗六千萬粟為一碩六億為十碩六十億為百碩六百億粟為千碩六千億粟為萬碩六萬億粟為十萬碩此佛名數乃是六十萬碩令一合九勺九抄令一百粒之數令於一聲之中可敵半劫之功以此教二老人則其功德甚大能滅無量劫罪出決疑集南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩歸命十方盡虗空界一切諸佛一拜歸命十方盡虗空界一切尊法一拜歸命十方盡虗空界一切賢聖一拜願共諸衆生往生安樂國至心歸命禮西方彌陀佛又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆以今懺悔清淨禮念三寶功德因緣願四生六道一切衆生始從今日至於往生以佛神力隨心自在當成正覺轉大法輪還度有情同生淨土懺悔已志心敬禮西方一切常住三寶發菩提心第七夫發菩提心者趣真戶牖立聖階基古佛因此而成先覺由斯而證衆行初首諸心本源冠五位之權輿貯三乘之囊槖或致彌伽之敬以初心弗異於終心或推羅漢之前蓋小果難同於大果無盡功德不可稱量者矣今日道場同業大衆相與自他禮懺罪障已竟身心清淨堪任發起大菩提心乃可求生淨土宜各志誠歡喜踊躍歸依世間大慈悲父南無教主釋迦牟尼佛南無世自在王佛南無西方阿彌陀佛南無五十五俱胝佛南無下方現在一切諸佛南無示現一切妙法正理常放火王勝德光佛南無師子佛南無名稱佛南無譽光佛南無正法佛南無妙法佛南無法幢佛南無功德友佛南無功德號佛如是等佛如殑伽沙住在下方廣長舌讚佛土功德攝受法門南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日大衆將發大心略啓三門一辨抑揚二興勝行三陳正願初復分二初稱揚彼土二呵斥此方初稱揚彼土者彌陀經云從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在説法彼土何故名為極樂其土衆生無有衆苦但受諸樂名曰極樂次呵斥此方者娑婆穢土五趣雜居內焚燎於三毒外煎熬於八苦脆如坯器危若火宅攬四緣而聚立因四相以遷移今日大衆發求生西方菩提心者欲欣淨土七珍先厭閻浮四相聊陳依正莊嚴略辨抑揚旨趣各各志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無德寶佛南無應名稱佛南無華身佛南無大音聲佛南無辨才讚佛南佛金剛珠佛南無無量壽佛南無珠莊嚴佛南無大王佛南無德高行佛南無高名佛南無百光佛南無喜悅佛南無龍步佛南無意願佛南無寶月佛南無滅己佛南無喜王佛南無調御佛南無喜自在王佛南無寶髻佛南無離山佛南無寶藏佛南無月面佛南無威德寂滅佛南無愛相佛南無多天佛南無須炎摩佛南無天威佛南無寶衆佛南無寶步佛南無師子分佛南無極高行佛南無人王佛南無善意佛南無世明佛南無寶威德佛南無德乘佛南無覺想佛南無喜莊嚴佛南無香濟佛南無香象佛南無衆炎佛南無慈相佛南無妙香佛南無堅鎧佛南無威德猛佛南無珠鎧佛南無仁賢佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜第二興勝行者略陳二種或偏修一行或具行八法且初者經云若有善男子善女人聞説阿彌陀佛執持名號若一日二日乃至七日其人臨命終時阿彌陀佛現在其前即得往生極樂世界即斯一行通具三心一直心正念真如法故以每念知念法性身即心即佛真法身故二深心樂修一切諸善行故撿防身口益自益他心行六度總攝三歸明記在懷俱稱為念三大悲心救拔一切衆生苦故申念佛心救濟三苦八苦諸衆生故一行精進三心具足二具行八法者維摩經云成就八法行無瘡疣生於淨土謂饒益衆生而不望報代一切衆生受諸苦惱所作功德盡以施之等心衆生謙下無礙於諸菩薩視之如佛所未聞經聞之不疑不與聲聞而相違背不嫉彼供不高己利而於其中調伏其心常省己過不訟彼短恆以一心求諸功德即此八因通收五願既識往生之行不離五願三心人各虔誠同宜偈曰仰啓盡十方無量無邊界一切佛菩薩我從今已往求生極樂國誓發菩提心有情無邊誓願度福智無邊誓願集佛法無邊誓願學如來無邊誓願侍無上菩提誓願成復次離相修行者依言滯相增生死之繫縛捨事歸真證涅槃之常樂況欲神棲淨土必須心了真空若能觸目見靈源即此塵緣為淨剎偈曰今所發覺心遠離諸性相蘊處及界等能取所取執諸法悉無我平等如虗空自心本不生空性圓寂故如諸佛菩薩發大菩提心我亦如是發是故志心禮今日大衆往生勝行念佛為先八因具足五願修成欲了唯心淨土須依離相菩提相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無善逝月佛南無梵自在王佛南無師子月佛南無福威德佛南無正生佛南無無勝佛南無日觀佛南無寶名佛南無大精進佛南無山光王佛南無施明佛南無電德佛南無德聚王佛南無供養名佛南無法讚佛南無寶語佛南無救命佛南無善戒佛南無善衆佛南無定意佛南無喜勝王佛南無師子光佛南無破有暗佛南無照明佛南無上名佛南無慧利王佛南無珠月光佛南無威光王佛南無不破論佛南無光明王佛南無珠輪佛南無世師佛南無吉手佛南無善月佛南無寶嚴佛南無羅睺守佛南無樂菩提佛南無等光佛南無至寂滅佛南無世最勝佛南無無憂佛南無十勢力佛南無喜力王佛南無得勢力佛南無得勢佛南無大勢力佛南無功德藏佛南無真行佛南無上安佛南無提沙佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜第三陳正願者願乘此受戒念佛功德臨命終時無諸障難七日已前預知時至心不顛倒身無痛苦遇善知識教稱佛名願阿彌陀佛與諸聖衆現在其前放大光明授手迎接自見其身乘金剛臺隨從佛後如彈指頃往生彼國到彼土已見佛聞法悟無生忍究竟至於不退轉地願與法界衆生一時同得阿耨多羅三藐三菩提惟願阿彌陀佛慈悲證明願以此功德普及於一切我等與衆生同生極樂國今日大衆發起覺心陳其正願臨終決定往生樂國相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無大光佛南無電明佛南無廣德佛南無珍寶佛南無福德明佛南無造鎧佛南無成手佛南無善華佛南無集寶佛南無大海智佛南無持地德佛南無義意猛佛南無善思惟佛南無德輪佛南無寶火佛南無利益佛南無世月佛南無美音佛南無梵相佛南無衆師首佛南無師子行佛南無難施佛南無應供佛南無明威德佛南無大光王佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆已發大菩提心所生功德六度四等日夜增明四無礙辨樂説無盡得八自在具六神通三昧總持應念現前百福莊嚴無不具足當成佛道還度衆生嗅許救切矚音燭哺音脯誣音無齧五結切燎音了脆此芮切疣音尤鎧苦亥切
