body:
  text: 極樂居士王子成集并序立此彌陀懺法者廣則恐其文繁略則慮其義闕如常禮念應赴只讀大字若推本末因緣須尋小注庶得廣略兩存自他俱益一帙十卷例皆倣此原夫釋迦大覺出慈旨以叮嚀讚彼彌陀運悲心而廣博發四十八之誓願願願度生開一十六之觀門門門攝化救提溺者越苦海之迅航指導迷人出輪回之捷徑高超三界逈出四流十方接引諸群生九品護持如一子又聞古今善士緇素名人感應尤多往生非一方袍圓頂宜追慧遠之高風儒履道冠可慕遺民之雅範啓芳懷玉壽終而化佛迎歸張抗吳瓊命盡而金仙引去善和具屠牛之業尚往玉池仲舉負害命之怨亦生金地慈光照處地獄為之崩隤聖號持時天魔為之悚懼不思議佛力無障礙神通一聲滅八十億劫罪𠎝一念獲八十億劫功德是以世尊觀彼方之緣會在此界之有情特開往生一門教入念佛三昧日修片時之少善後為萬劫之資糧現世則白業頓增惡緣漸息人敬而神祐禍去而福來梁氏女目盲而重明馮夫人身病而復差邵希文神遊而脫難劉慧仲夢魘而無驚此乃身前之效也臨終則免赴黃泉更無黑業緩則一日至于七日急則十聲至于一聲面覩白玉毫身乘紫金座閻王不敢召化佛自來迎直歸極樂之鄉永別幽冥之路范婆瞻聖像於戶外曇鑒得蓮華於瓶中烏長王天樂盈空隋文后異香滿空此乃往生之徵也過世則名除鬼簿位列佛階丘冢現祥輝骨骸為舍利拋閻浮之短景居安養之長年化生菡萏華中託質芙蓉池內勢至觀音為其勝友馬鳴龍樹結作法朋雖名往生凡夫便是不退佛子前唐善導垂語向五雲堂中後魏曇鸞現形於七寶舫內此乃身後之驗也壽盡臨終之感應傳廣聊陳生前身後之禎祥文繁略載凡夫心劣用自力以難成法藏願強仗他威而易就自他二利悲智兩全幸當末法之時此教大弘之際今則愚將管見強發毫端頗依梁武懺之規儀粗闡彌陀教之功德千佛備列衆聖全彰十方調御共力消殃三世如來同緣懺罪削阿鼻之恐怖說淨土之莊嚴三塗路上教箇箇回程九品池邊使人人進步流通十卷懺法度脫三世衆生經云梵語阿彌陀此云無量壽或云無量光梵語須摩提此云極樂國或云安樂剎若受持讀誦為過去者救拔惡趣為現在者增福消災為未來者教修淨土廣於三界偏及四生或行十惡業見聞則霧散若犯五無間禮念則雲消引一切有情化生度無量衆生成佛蒙此懺力受彼佛恩西方淨土一譯往生無上菩提兩手分付請威加護偈曰集此彌陀禮念懺欲於濁世救群生同超三界出輪回盡令離苦生極樂自恩福薄智慧淺凡愚學寡文荒踈發揮淨土讚彌陀捧土培山蠡酌海懺法廣大才輕微慚恐不契諸佛心我今清淨身口意焚香哀請道場中仰告三世與十方彌陀淨土諸三寶惟願不捨大慈悲神通法力冥加護願賜觀音甘露辨下筆盈軸如智覺上契諸聖下契機集成懺法度有情衆生見聞喜信受流通傳布遍十方廣度一切衆生界盡未來際恆無盡若有十惡無間罪遇此懺法滅無餘現在皆具五功能過去咸蒙八解脫臨終悉願往西方共覩彌陀成佛道啓請三寶今日道場幽顯大衆仰啓三身四智圓明十號之尊八藏五乘微妙一真之教悲增智增之菩薩有學無學之應真遍法界之龍天盡虗空之賢聖伏冀不捨慈悲之願惟垂照鑒之心今日夜建淨土道場示群生歸向陳斯勝會露以丹誠蓋以某甲等某甲字請各自稱名後皆例此三界受身循環豈離於六道一雲乘質漂流未出於四生人間八苦交煎天上五衰共惱不有大慈悲父孰開真解脫門欲修九品之真歸須懺多生之惡業而況圓明妙體本唯一心虗幻浮生妄為衆罪罪唯妄起隨惡緣而乃成妄以真除因善念而得滅幸望同業大衆各收異念攀緣盡出苦輪同生樂國今依釋迦遺教禮懺法門召請聖賢願垂感降南無一心奉請靈山不滅鶴樹常存千百億化身釋迦牟尼佛南無一心奉請光明普照壽命難思四十八願阿彌陀佛南無一心奉請一生兜率三會龍華當來下生彌勒尊佛南無一心奉請五峯聖主七祖佛師大聖文殊師利菩薩南無一心奉請如來長子法界願王大聖普賢菩薩南無一心奉請普門示現願力弘深大聖觀世音菩薩南無一心奉請念佛三昧攝化衆生大聖大勢至菩薩南無一心奉請菩提高廣大智宏深清淨大海衆菩薩南無一心奉請十方盡虗空界一切諸佛一拜南無一心奉請十方盡虗空界一切尊法一拜南無一心奉請十方盡虗空界一切賢聖一拜又復一心奉請十方盡虗空界一切三寶無量賢聖一拜今日道場幽顯大衆已請三寶處瀝丹誠披露積𠎝願求禮懺某甲等志心歸投西方淨土極樂世界阿彌陀佛歸依西方三寶第一決疑生信第二引教比證第三往生傳録第四極樂莊嚴第五禮懺罪障第六發菩提心第七發願往生第八求生行門第九總為禮佛第十自慶第十一普皆回向第十二囑纍流通第十三歸依西方三寶第一夫歸依西方三寶者我佛隨根授道應物現形廣演修多羅偏讚彌陀國因緣際會感應道交凡心專想於西方真身定降於瞻部其猶葉公畫龍而龍現子晉吹鳳而鳳來蓋凡聖以交通由志誠之冥會是以慈恩首稱十勝智者明辨十疑太白子瞻共說勸生之偈樂天子厚因述願往之文優曇花之一開不知幾劫浮木孔之相值何啻千生獲利尤多用功極鮮是以六方共讚十剎同宣主勝願強緣深悲重欲知淨土求生路當入彌陀禮懺門今日道場同業大衆宜各人人攝心諦聽今為憐愍一切衆生無明覆心迷於淨土戀著三界不求往生六道輪回漂流生死為斯顛倒無信凡夫集諸經論教修往生西方淨土極樂世界度生道場禮懺法門良為凡夫垢重貪愛昏迷造罪恣情不怖泥犁痛苦長劫平生放逸但嗜奢華不知修進臨終苦逼方始歸依縱欲處誠注心何地荒忙失志無法可憑甘入三塗可悲可愍無依無怙無趣無歸今乃遣愚昧者起信求生令智慧者決疑悟道所有我等無始至今不信歸依西方三寶不求厭離濁世五燒不了自心起惑造業或五逆十惡破齊犯戒具諸不善生死輪回至於今日皆因從昔以來不覺不知不聞不見不親師友不逢經教不識因果妄起毀謗自作教他見作隨喜業障所使都無信受一切種種障難因緣阻往生行斷成佛種墮失聖胎漂沉惡趣未來生死無有盡期不得往生不得解脫皆因我等罪業牽纏愚迷顛倒不信阿彌陀佛不信往生淨土身口意業侮慢訶毀或時見聞心則輕笑見人禮念惡心毀謗破他善事不肯勸修惱亂行者讚歎邪師設爾信者進退猶豫無決定心身在道場心緣世務口談淨土意戀閻浮雖手掐念珠而心懷毒惡外境則違順繁興內心則愛憎迭起唯有虗言全無實行善未積於毫𨤲惡已成於山嶽不仗三歸難除五怖如是等罪無量無邊求哀禮懺願乞除滅相與志心等一痛切五體投地歸依世間大慈悲父志心歸命西方淨土極樂世界一切佛寶一拜志心歸命西方淨土極樂世界一切法寶一拜志心歸命西方淨土極樂世界一切僧寶一拜西方諸三寶我等與衆生志心歸命禮願生安樂國又復歸依如是西方淨土極樂世界一切三寶無量賢聖一拜今日道場同業大衆重加志誠一心諦聽無量壽經云彌勒菩薩白佛言世尊於此娑婆世界有幾不退菩薩生無量壽佛國佛告彌勒於此世界有六十七億不退菩薩往生彼國一一菩薩已曾供養諸佛次如彌勒者也諸小行菩薩及修習少功德者不可稱計皆當往生不但我剎諸菩薩往生十方世界無量佛國其往生者甚多無數像法決疑經說佛滅度後正法五百年持戒堅固像法一千年禪定堅固末法一萬年念佛堅固准法王本記釋迦文已有二千餘年入末法來數百餘載故知正是衆生念佛堅固彌陀度生時緣已至如經所說此界衆生我等大衆根緣成熟機感相應遇斯懺法往生無量是知念佛福生禮懺罪滅求生淨土萬無遺一宜各諦信佛言厭離娑婆欣求極樂相與志心五體投地歸依世間大慈悲父歸依十方盡虗空界一切諸佛一拜歸依十方盡虗空界一切尊法一拜歸依十方盡虗空界一切賢聖一拜願共諸衆生往生安樂國志心歸命禮西方彌陀佛又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆無量壽經云娑婆世界共爭不急之事於此劇惡極苦之中勤身營務以自給活無尊無卑無貧無富少長男女共憂錢財有無同然憂思適等屏營愁苦思念積慮為心走使無有安時心常念惡口常言惡身常行惡曾無一善不信先聖諸佛經法不信行道可得度世不信死後神明更生不信作善得善為惡得惡心中閉塞意不開解大命將終悔懼交至不預修善臨終方悔悔之於後將何及乎如是世人難可具盡故自然三塗無量苦惱展轉其中世世纍劫無有出期難得解脫痛不可言是為五大惡五痛五燒勤苦如是譬如大火焚燒人身汝今諸天人民及後世人得佛經語當熟思之能於其中端心正行齊戒清淨一日一夜勝在無量壽國為善百歲所以者何彼佛國土無為自然皆積衆善無毛髮之惡佛言我哀愍汝等諸天人民甚於父母念子今我於此世作佛降化五惡消除五痛絶滅五燒宜各人人志誠遵奉相與志心五體投地歸依世間大慈悲父歸依十方盡虗空界一切諸佛一拜歸依十方盡虗空界一切尊法一拜歸依十方盡虗空界一切賢聖一拜願共諸衆生往生安樂國志心歸命禮西方彌陀佛又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆前略明厭離娑婆五痛五燒過患已竟次乃欣求極樂三歸三寶志誠諦聽陀羅尼雜集經云爾時世尊告諸比丘西方安樂世界今現有佛號阿彌陀若有四衆能正受持彼佛名號以此功德臨欲終時阿彌陀佛即與大衆往此人所令其得見見已尋生慶悅倍增功德以是因緣所生之處永離胞胎穢欲之形純處鮮妙寶蓮華中自然化生具大神通光明赫奕爾時恆沙諸佛皆共讚彼安樂世界下文偈略經廣例皆倣此佛教於阿難西方禮三寶彼此遙見聞無量壽經說無量壽經云佛告阿難汝起更整衣服合掌恭敬禮無量壽佛十方國土諸佛如來常共稱揚讚歎彼佛無著無礙於是阿難起整衣服正身西向恭敬合掌五體投地禮無量壽佛白言世尊願見彼佛安樂國土及諸菩薩聲聞之衆說是語已即時無量壽佛放大光明普照一切諸佛世界等爾時阿難即見無量壽佛威德巍巍如須彌山王高出一切諸世界上相好光明靡不照曜此會四衆一時悉見彼見此土亦復如是爾時佛告阿難及慈氏菩薩汝見彼國從地已上至淨居天其中所有微妙嚴淨自然之物為悉見不阿難對曰唯然已見汝寧復聞無量壽佛大音宣布一切世界化衆生不阿難對曰唯然已聞彼國人民乘百千由旬七寶宮殿無所障礙遍至十方供養諸佛汝等復見不對曰已見云云出服字號夫人韋提希引導未來人求生極樂國十六觀經說觀無量壽經云時韋提希見佛世尊自絶瓔珞舉身投地號泣向佛白言世尊唯願世尊為我廣說無憂惱處我當往生不樂閻浮提濁惡世也此濁惡世地獄餓鬼畜生盈滿多不善聚願我未來不聞惡聲不見惡人今向世尊五體投地求哀懺悔惟願佛日教我觀於清淨業處爾時世尊放眉間光其光金色遍照十方無量世界還住佛頂化為金臺如須彌山十方諸佛淨妙國土皆於中現或有國土七寶合成復有國土純是蓮華復有國土如自在天宮復有國土如玻鏡十方國土皆於中現有如是等無量諸佛國土嚴顯可觀令韋提希見時韋提希白佛言世尊是諸佛土雖復清淨皆有光明我今樂生極樂世界阿彌陀佛所唯願世尊教我思惟教我正受時無量壽佛住立空中觀音勢至侍立左右爾時韋提希見無量壽佛已接足作禮白佛言世尊我今因佛神力故得見無量壽佛及二菩薩及彼國土若佛滅後諸衆生等濁惡不善五苦所逼云何當見阿彌陀佛極樂世界佛言善哉快問此事阿難汝當受持廣為多衆宣說佛語如來今者教韋提希及未來世一切衆生觀於西方極樂世界以佛力故當得見彼清淨佛國如執明鏡自見面像見彼國土極妙樂事心歡喜故應時即得無生法忍佛告韋提希汝是凡夫心想羸劣未得天眼不能遠觀諸佛如來有異方便令汝得見佛告韋提希汝及衆生應當專心繫念一處想於西方云何作想凡作想者一切衆生自非生盲有目之徒皆見日沒當起想念正坐西向諦觀於日令心堅住專想不移見日欲沒狀如懸鼓既見日已閉目開目皆令明了是為日想名曰初觀次作水觀地觀樹觀乃至下品第十六觀廣如經說爾時世尊說是語時韋提希與五百侍女聞佛所說應時即見極樂世界廣長之相得見佛身及二菩薩心生歡喜歎未曾有豁然大悟逮無生法忍五百侍女發菩提心願生彼國世尊悉記皆當往生行此三昧者現身得見無量壽佛及二大士但聞佛名二菩薩名除無量劫生死之罪何況憶念若念佛者當知此人是人中芬陀利華觀音勢至為其勝友當坐道場生諸佛家出豈字號造惡中夭人念佛或供養復增其壽命決定王經說大乘聖無量壽決定光明王如來經云佛告妙吉祥菩薩言今此閻浮提世界中人壽命百歲於中多有造諸惡業而復中夭妙吉祥菩薩若有衆生得見此經功德殊勝及聞名號如其短命之人志心書寫受持讀誦供養禮拜如是之人復增壽命滿於百歲若能持念一百八遍如此短命衆生復增壽命或但聞其名號志心信受遵崇之者是人亦得增益壽命出刻字號恐怖縣官者念二菩薩名解脫恐怖厄彌陀大經說阿彌陀三耶三佛薩樓佛檀過度人道經云佛言世間人民善男子善女人若有急難恐怖縣官事者但自歸命是蓋樓亘菩薩摩訶那鉢菩薩所無不得解脫者出服字號昔有四億衆願生無欲國同時見淨土斷結經中說十住斷結經云爾時世尊放覺華定意三昧光明有四億衆見此瑞色各生患厭心自思惟夫生有死皆由因緣死此生彼牽連不斷染欲為源斯由貪愛我等願生無欲國土乃得修此覺意三昧是時世尊知來會者心中所念而告之曰西方去此無數佛土有佛名無量壽其土清淨無淫怒癡悉同一心皆由蓮華中生不因父母情欲而生純是童男亦無女人無大小便以禪悅法樂為食無想念識共相敬念如父如母欲生彼者可發誓願時四億衆即於座上同心發願求生彼土爾時世尊即放覺意三昧光明照彼國土如來世尊及化生菩薩其國廣博衆寶雜廁無三惡道八難之苦見彼國已此四億人隨其形壽皆得同時生彼國土出能字號衆生念彌陀菩薩常衛護鬼神不得便往生經中說禮懺儀十往生經云若有衆生念阿彌陀佛願往生者彼佛即遣二十五菩薩衛護行者若行若住若坐若臥若晝若夜一切時一切處不令惡鬼惡神得其便也出丁字號有善相童女厭濁禮西方佛力化為男經律異相說經律異相云佛在舍衛國時有長者女名善信年始十五為人慈孝智慧博達少小常有大願不樂世俗之事坐自思念萬物無常當歸於死年壽萬載亦皆當死天地當壞何況人身死後魂神當入惡道酷毒勤苦獨當受之本從何出忽有瞋恚恐怖愁憂或時歡喜有此無常之事不見來時去至何所是輩往來無休無息念我父母諸家兄弟中外親屬不知罪福貪欲無厭我年三五以許他男諸家兄弟飯食酒肉受取匹帛念我身當往受患難物質縛結不可得離當如之何為此生老不如及我今日清淨當發上願求覔安隱長樂宮殿可以自娛不宜染濁沒於三塗不覩光明長與苦俱便正一心自誓持我身命自當有神有靈知我心誠爾時天神現於虗空語善信言若當自歸西方安隱清淨法國且當先向十方禮拜慈心敬意念必達也已便不現爾時善信踊躍歡喜便自澡浴燒香散華向十方禮叉手自思念一切人即有天神於虗空中言汝當正心向於西方說此一頌以是讚歎阿彌陀佛如神所勑爾時佛與大衆飛到善信家於佛前化身為男今日道場同業大衆相與志心五體投地歸依世間大慈悲父南無教主釋迦牟尼佛南無西方阿彌陀佛南無當來彌勒佛南無維衛佛南無式棄佛南無隨葉佛南無拘留秦佛南無拘那含佛南無迦葉佛南無善德佛南無無憂德佛南無栴檀德佛南無寶施佛南無無量明佛南無華德佛南無相德佛南無三乘行佛南無廣衆德佛南無明德佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛南無寶火佛南無寶月光佛南無現無愚佛南無寶月佛南無無垢佛南無離垢佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩又復歸依如是十方盡虗空界一切三寶無量賢聖一拜今日道場同業大衆願弟子某甲等從今已去至坐道場厭離娑婆五痛五燒欣求極樂三歸三寶隨願往生西方淨土發願已歸命禮西方淨土一切三寶闒音塔冗而瀧切思過上去燧音遂適音釋苟音狗夔音逵僻普擊切疫音役癘音例不勝音升舉也下准此嗜音視遽其據切急也迅音信航胡郎切緇音之抗音航隤杜回切悚息拱切魘音靨菡胡感切萏徒感切舫音放培音裴蠡音螺宏戶萌切啻施智切侮音武慢也猶豫上餘救切迭徒結切劇奇逆切奕音亦唯然上以水切諾也中夭上去下於兆切酷苦沃切
